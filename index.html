<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>CSCO — Mesa de Servicio</title>
<meta name="theme-color" content="#1a5276">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="CSCO Mesa">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:       #0d1117;
  --s1:       #161b22;
  --s2:       #1c2128;
  --s3:       #21262d;
  --border:   #30363d;
  --border2:  #3d444d;
  --accent:   #1f6feb;
  --accent2:  #388bfd;
  --ok:       #238636;
  --ok2:      #2ea043;
  --warn:     #9e6a03;
  --warn2:    #d29922;
  --danger:   #b62324;
  --danger2:  #f85149;
  --purple:   #6e40c9;
  --purple2:  #a371f7;
  --text:     #e6edf3;
  --text2:    #8b949e;
  --text3:    #484f58;
  --radius:   8px;
  --font:     'IBM Plex Sans', sans-serif;
  --mono:     'IBM Plex Mono', monospace;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:var(--font);font-size:14px;min-height:100vh;}

/* ── SCROLLBAR ── */
::-webkit-scrollbar{width:6px;height:6px;}
::-webkit-scrollbar-track{background:var(--bg);}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px;}

/* ══ LOGIN ══════════════════════════════════════════════ */
#screen-login{
  min-height:100vh;display:flex;align-items:center;justify-content:center;
  background:radial-gradient(ellipse 80% 60% at 20% 50%, #0d2045 0%, var(--bg) 60%);
}
.login-wrap{width:360px;}
.login-brand{
  display:flex;align-items:center;gap:10px;margin-bottom:32px;
}
.login-brand .ico{
  width:36px;height:36px;border-radius:8px;
  background:linear-gradient(135deg,var(--accent),var(--purple));
  display:flex;align-items:center;justify-content:center;
  font-weight:700;font-size:15px;color:#fff;letter-spacing:-1px;
}
.login-brand .name{font-size:17px;font-weight:600;letter-spacing:-.3px;}
.login-brand .sub{font-size:11px;color:var(--text2);font-family:var(--mono);margin-top:2px;}
.login-card{
  background:var(--s1);border:1px solid var(--border);
  border-radius:12px;padding:28px;
}
.login-card h2{font-size:18px;font-weight:600;margin-bottom:4px;}
.login-card .hint{font-size:12px;color:var(--text2);margin-bottom:24px;}
.fg{margin-bottom:14px;}
.fg label{display:block;font-size:11px;font-weight:500;color:var(--text2);margin-bottom:5px;letter-spacing:.3px;text-transform:uppercase;}
.fg input,.fg select,.fg textarea{
  width:100%;padding:8px 12px;
  background:var(--bg);border:1px solid var(--border);
  border-radius:var(--radius);color:var(--text);font-family:var(--font);font-size:13px;
  outline:none;transition:border-color .15s;
}
.fg input:focus,.fg select:focus,.fg textarea:focus{border-color:var(--accent2);}
.fg textarea{resize:vertical;min-height:80px;line-height:1.5;}
.btn{
  display:inline-flex;align-items:center;gap:6px;
  padding:8px 16px;border-radius:var(--radius);border:none;
  font-family:var(--font);font-size:13px;font-weight:500;cursor:pointer;
  transition:opacity .15s,background .15s;
}
.btn:hover{opacity:.85;}
.btn-primary{background:var(--accent);color:#fff;width:100%;justify-content:center;padding:10px;}
.btn-ok{background:var(--ok);color:#fff;}
.btn-ghost{background:var(--s3);color:var(--text2);border:1px solid var(--border);}
.btn-danger{background:transparent;color:var(--danger2);border:1px solid var(--danger);}
.btn-sm{padding:5px 12px;font-size:12px;}
.btn-purple{background:var(--purple);color:#fff;}
.demo-hint{font-size:11px;color:var(--text3);text-align:center;margin-top:14px;line-height:1.7;font-family:var(--mono);}

/* ══ LAYOUT ══════════════════════════════════════════════ */
#screen-app{display:none;flex-direction:column;min-height:100vh;}

/* topbar */
.topbar{
  height:52px;background:var(--s1);border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
  padding:0 20px;position:sticky;top:0;z-index:100;
}
.tb-left{display:flex;align-items:center;gap:10px;}
.tb-brand{font-size:14px;font-weight:600;letter-spacing:-.2px;}
.tb-sep{color:var(--text3);font-size:16px;}
.tb-section{font-size:13px;color:var(--text2);}
.role-badge{
  font-size:10px;font-family:var(--mono);font-weight:500;letter-spacing:.5px;
  padding:2px 9px;border-radius:20px;text-transform:uppercase;
}
.rb-agente  {background:rgba(31,111,235,.15);color:var(--accent2);border:1px solid rgba(31,111,235,.3);}
.rb-supervisor{background:rgba(110,64,201,.15);color:var(--purple2);border:1px solid rgba(110,64,201,.3);}
.rb-tecnico {background:rgba(35,134,54,.15);color:#3fb950;border:1px solid rgba(35,134,54,.3);}
.rb-config  {background:rgba(248,81,73,.15);color:#f85149;border:1px solid rgba(248,81,73,.3);}
.tb-right{display:flex;align-items:center;gap:10px;}
.tb-user{font-size:12px;color:var(--text2);}
.btn-exit{
  background:none;border:1px solid var(--border);color:var(--text2);
  padding:4px 12px;border-radius:var(--radius);font-family:var(--font);font-size:12px;cursor:pointer;
}
.btn-exit:hover{border-color:var(--text2);color:var(--text);}

/* sidebar + content */
.layout{display:flex;flex:1;}
.sidebar{
  width:200px;background:var(--s1);border-right:1px solid var(--border);
  padding:16px 8px;flex-shrink:0;
}
.nav-group{margin-bottom:20px;}
.nav-label{font-size:10px;color:var(--text3);font-weight:500;letter-spacing:.8px;text-transform:uppercase;padding:0 8px;margin-bottom:6px;}
.nav-item{
  display:flex;align-items:center;gap:8px;
  padding:7px 10px;border-radius:6px;cursor:pointer;
  color:var(--text2);font-size:13px;font-weight:400;transition:all .15s;
  margin-bottom:2px;
}
.nav-item:hover{background:var(--s3);color:var(--text);}
.nav-item.active{background:rgba(31,111,235,.12);color:var(--accent2);}
.nav-item .ni-icon{font-size:14px;width:18px;text-align:center;}
.nav-badge{
  margin-left:auto;background:var(--danger2);color:#fff;
  font-size:10px;font-family:var(--mono);padding:1px 6px;border-radius:10px;
}

.content{flex:1;padding:24px;overflow-y:auto;max-height:calc(100vh - 52px);}
.page{display:none;}
.page.active{display:block;}

/* ══ STATS ═══════════════════════════════════════════════ */
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:24px;}
.stat{
  background:var(--s1);border:1px solid var(--border);
  border-radius:var(--radius);padding:16px;
}
.stat .n{font-size:30px;font-weight:600;font-family:var(--mono);line-height:1;}
.stat .l{font-size:11px;color:var(--text2);margin-top:4px;}
.n-open{color:var(--warn2);}
.n-prog{color:var(--accent2);}
.n-done{color:#3fb950;}
.n-cls {color:var(--text3);}

/* ══ TABLA TICKETS ══════════════════════════════════════ */
.page-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;}
.page-title{font-size:16px;font-weight:600;}
.filters{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px;}
.fbtn{
  padding:4px 12px;border-radius:20px;font-size:12px;font-weight:500;cursor:pointer;
  background:var(--s2);border:1px solid var(--border);color:var(--text2);
  transition:all .15s;font-family:var(--font);
}
.fbtn.active,.fbtn:hover{background:var(--accent);border-color:var(--accent);color:#fff;}

.tkt-table{width:100%;border-collapse:collapse;}
.tkt-table th{
  text-align:left;font-size:11px;font-weight:500;color:var(--text2);
  letter-spacing:.4px;text-transform:uppercase;padding:8px 12px;
  border-bottom:1px solid var(--border);background:var(--s1);
}
.tkt-table th:first-child{border-radius:var(--radius) 0 0 0;}
.tkt-table th:last-child{border-radius:0 var(--radius) 0 0;}
.tkt-row{
  border-bottom:1px solid var(--border);cursor:pointer;
  transition:background .12s;
}
.tkt-row:hover{background:var(--s2);}
.tkt-row td{padding:10px 12px;font-size:13px;vertical-align:middle;}
.folio{font-family:var(--mono);font-size:11px;color:var(--text3);}
.tkt-title{font-weight:500;margin-bottom:2px;}
.tkt-cliente{font-size:11px;color:var(--text2);}
.empty{text-align:center;padding:48px;color:var(--text3);}
.empty .e-icon{font-size:32px;margin-bottom:10px;}

/* badges */
.badge{
  display:inline-block;font-size:10px;font-family:var(--mono);font-weight:500;
  padding:2px 8px;border-radius:4px;white-space:nowrap;
}
.b-abierto {background:rgba(210,153,34,.12);color:var(--warn2);border:1px solid rgba(210,153,34,.2);}
.b-proceso  {background:rgba(56,139,253,.12);color:var(--accent2);border:1px solid rgba(56,139,253,.2);}
.b-resuelto {background:rgba(63,185,80,.12);color:#3fb950;border:1px solid rgba(63,185,80,.2);}
.b-cerrado  {background:rgba(72,79,88,.12);color:var(--text3);border:1px solid rgba(72,79,88,.2);}
.b-alta  {background:rgba(248,81,73,.12);color:var(--danger2);}
.b-media {background:rgba(210,153,34,.1);color:var(--warn2);}
.b-baja  {background:rgba(63,185,80,.1);color:#3fb950;}
.b-sin   {background:var(--s3);color:var(--text3);}

/* ══ FORMULARIO NUEVO TICKET ════════════════════════════ */
.form-card{
  background:var(--s1);border:1px solid var(--border);
  border-radius:var(--radius);padding:24px;max-width:760px;
}
.form-card h3{font-size:15px;font-weight:600;margin-bottom:20px;padding-bottom:12px;border-bottom:1px solid var(--border);}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.form-full{grid-column:1/-1;}
.form-actions{margin-top:20px;display:flex;gap:10px;}

/* ══ MODAL ═══════════════════════════════════════════════ */
.overlay{
  display:none;position:fixed;inset:0;
  background:rgba(0,0,0,.75);z-index:300;
  align-items:flex-start;justify-content:center;padding:24px;overflow-y:auto;
}
.overlay.open{display:flex;}
.modal{
  background:var(--s1);border:1px solid var(--border);
  border-radius:12px;width:100%;max-width:600px;margin:auto;
  animation:fadeUp .2s ease;
}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:translateY(0);}}
.modal-hdr{
  padding:18px 22px 14px;border-bottom:1px solid var(--border);
  display:flex;justify-content:space-between;align-items:flex-start;
}
.modal-hdr h3{font-size:15px;font-weight:600;}
.modal-folio{font-family:var(--mono);font-size:11px;color:var(--text3);margin-top:3px;}
.btn-cls{background:none;border:none;color:var(--text2);font-size:20px;cursor:pointer;line-height:1;padding:2px 4px;}
.btn-cls:hover{color:var(--text);}
.modal-body{padding:18px 22px;}
.m-badges{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px;}
.m-section{margin-bottom:16px;}
.m-label{font-size:11px;color:var(--text2);font-weight:500;letter-spacing:.3px;text-transform:uppercase;margin-bottom:5px;}
.m-val{font-size:13px;line-height:1.5;}
.m-box{
  background:var(--bg);border:1px solid var(--border);
  border-radius:6px;padding:10px 12px;font-size:13px;
  color:var(--text2);line-height:1.6;
}
.m-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px;}

/* historial */
.history{margin-bottom:16px;}
.history h4{font-size:12px;color:var(--text2);font-weight:500;text-transform:uppercase;letter-spacing:.4px;margin-bottom:10px;}
.note{padding:9px 12px;border-radius:6px;margin-bottom:6px;font-size:12px;line-height:1.5;}
.note-agente{background:rgba(31,111,235,.07);border-left:3px solid var(--accent);}
.note-supervisor{background:rgba(110,64,201,.07);border-left:3px solid var(--purple);}
.note-sistema{background:var(--bg);border-left:3px solid var(--border);color:var(--text2);}
.note-tecnico{background:rgba(35,134,54,.07);border-left:3px solid var(--ok2);}
.note-meta{font-size:10px;color:var(--text3);margin-top:4px;font-family:var(--mono);}

/* controles modal */
.m-controls{border-top:1px solid var(--border);padding-top:16px;margin-top:4px;}
.m-controls h4{font-size:12px;color:var(--text2);font-weight:500;text-transform:uppercase;letter-spacing:.4px;margin-bottom:12px;}
.ctrl-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px;}
.btn-ot{
  width:100%;padding:9px;border-radius:var(--radius);border:1px dashed var(--ok2);
  background:rgba(35,134,54,.06);color:#3fb950;font-family:var(--font);font-size:13px;
  font-weight:500;cursor:pointer;margin-bottom:12px;transition:all .15s;
}
.btn-ot:hover{background:rgba(35,134,54,.14);border-style:solid;}

/* Orden de Trabajo */
.ot-card{
  background:var(--bg);border:1px solid var(--border);
  border-radius:8px;padding:16px;margin-bottom:12px;
}
.ot-card h4{font-size:13px;font-weight:600;margin-bottom:12px;color:var(--accent2);}
.ot-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;}

/* ══ TOAST ═══════════════════════════════════════════════ */
.toast{
  position:fixed;bottom:24px;right:24px;z-index:999;
  background:var(--s2);border:1px solid var(--border);
  border-radius:8px;padding:10px 16px;font-size:13px;
  display:flex;align-items:center;gap:8px;
  transform:translateY(60px);opacity:0;transition:all .25s;pointer-events:none;
}
.toast.show{transform:translateY(0);opacity:1;}
.toast.t-ok{border-color:var(--ok2);color:#3fb950;}
.toast.t-err{border-color:var(--danger2);color:var(--danger2);}

/* ══ PRINT OT ════════════════════════════════════════════ */
#ot-print{display:none;}
@media print{
  body>*{display:none!important;}
  #ot-print{
    display:block!important;font-family:'IBM Plex Sans',sans-serif;
    color:#000;padding:24px;font-size:12px;
  }
  .ot-print-header{border-bottom:2px solid #000;padding-bottom:12px;margin-bottom:16px;}
  .ot-print-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px;}
  .ot-field label{font-size:10px;font-weight:600;text-transform:uppercase;display:block;margin-bottom:2px;}
  .ot-field span{border-bottom:1px solid #ccc;display:block;padding-bottom:4px;min-height:20px;}
  .ot-desc{border:1px solid #ccc;padding:8px;min-height:60px;margin-bottom:12px;}
  .ot-firma{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;margin-top:24px;}
  .ot-firma-box{border-top:1px solid #000;padding-top:6px;font-size:10px;}
}

/* Todos los campos en mayúsculas */
input[type="text"], input[type="number"], input[type="email"], 
input[type="password"], textarea {
  text-transform: uppercase;
}
/* Excepciones: password, email y campos específicos NO en mayúsculas */
input[type="password"], input[type="email"],
input#f-email, input#li-pass, input#li-user {
  text-transform: none !important;
}
@media(max-width:700px){
  .sidebar{display:none;}
  .stats-row{grid-template-columns:1fr 1fr;}
  .form-grid{grid-template-columns:1fr;}
  .m-grid{grid-template-columns:1fr;}
  .ot-row{grid-template-columns:1fr;}
}
/* ══ DIRECTORIO FLOTANTE ════════════════════════════ */
.dir-btn{
  position:fixed;bottom:24px;right:24px;z-index:200;
  background:var(--accent);color:#fff;border:none;
  border-radius:50%;width:48px;height:48px;font-size:20px;
  cursor:pointer;box-shadow:0 4px 12px rgba(0,0,0,.4);
  display:none;align-items:center;justify-content:center;
  transition:background .15s;
}
.dir-btn:hover{background:var(--accent2);}
.dir-panel{
  position:fixed;bottom:82px;right:24px;z-index:200;
  background:var(--s1);border:1px solid var(--border);
  border-radius:12px;width:280px;
  box-shadow:0 8px 24px rgba(0,0,0,.5);
  display:none;flex-direction:column;overflow:hidden;
}
.dir-panel.open{display:flex;}
.dir-hdr{
  background:var(--accent);padding:12px 16px;
  display:flex;justify-content:space-between;align-items:center;
}
.dir-hdr span{font-size:13px;font-weight:600;color:#fff;}
.dir-hdr button{background:none;border:none;color:#fff;font-size:18px;cursor:pointer;line-height:1;}
.dir-search{padding:8px 12px;border-bottom:1px solid var(--border);}
.dir-search input{
  width:100%;padding:6px 10px;background:var(--bg);
  border:1px solid var(--border);border-radius:6px;
  color:var(--text);font-family:var(--font);font-size:12px;outline:none;
}
.dir-table{overflow-y:auto;max-height:280px;}
.dir-row{
  display:grid;grid-template-columns:70px 1fr;
  padding:8px 12px;border-bottom:1px solid var(--border);
  cursor:pointer;transition:background .12s;font-size:12px;
}
.dir-row:hover{background:var(--s3);}
.dir-row .num{font-family:var(--mono);color:var(--accent2);font-weight:600;}
.dir-row .nom{color:var(--text);}
/* ══ CONFIG PANEL ════════════════════════════════════ */
.cfg-card{background:var(--s1);border:1px solid var(--border);border-radius:var(--radius);padding:24px;max-width:600px;margin-bottom:16px;}
.cfg-card h3{font-size:14px;font-weight:600;margin-bottom:4px;}
.cfg-card .hint{font-size:12px;color:var(--text2);margin-bottom:16px;}
.cfg-section{margin-bottom:20px;padding-bottom:20px;border-bottom:1px solid var(--border);}
.cfg-section:last-child{border-bottom:none;margin-bottom:0;padding-bottom:0;}
.cfg-section h4{font-size:12px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.4px;margin-bottom:12px;}
.user-row{display:flex;align-items:center;gap:8px;margin-bottom:8px;padding:8px 10px;background:var(--bg);border:1px solid var(--border);border-radius:6px;}
.user-row .u-name{flex:1;font-size:13px;}
.user-row .u-role{font-size:11px;color:var(--text2);}
.danger-zone{background:rgba(248,81,73,.05);border:1px solid rgba(248,81,73,.2);border-radius:var(--radius);padding:16px;}
.danger-zone h4{color:var(--danger2);}
</style>
</head>
<body>

<!-- ══ LOGIN ════════════════════════════════════════════ -->
<div id="screen-login">
  <div class="login-wrap">
    <div class="login-brand">
      <div class="ico">CS</div>
      <div>
        <div class="name">CSCO Mesa de Servicio</div>
        <div class="sub">Centro de Servicios en Comunicación</div>
      </div>
    </div>
    <div class="login-card">
      <h2>Iniciar sesión</h2>
      <p class="hint">Acceso exclusivo para personal CSCO</p>
      <div class="fg">
        <label>Usuario</label>
        <input type="text" id="li-user" placeholder="usuario" value="agente">
      </div>
      <div class="fg">
        <label>Contraseña</label>
        <input type="password" id="li-pass" placeholder="••••••" value="1234"
               onkeydown="if(event.key==='Enter')doLogin()">
      </div>
      <button class="btn btn-primary" onclick="doLogin()">Entrar</button>
      <p class="demo-hint">
        agente / 1234 &nbsp;·&nbsp; supervisor / 1234 &nbsp;·&nbsp; tecnico / 1234
      </p>
    </div>
  </div>
</div>

<!-- ══ APP ═══════════════════════════════════════════════ -->
<div id="screen-app">
  <div class="topbar">
    <div class="tb-left">
      <div class="tb-brand">CSCO</div>
      <span class="tb-sep">/</span>
      <span class="tb-section">Mesa de Servicio</span>
      <span class="role-badge" id="tb-role"></span>
    </div>
    <div class="tb-right">
      <span class="tb-user" id="tb-user"></span>
      <button class="btn-exit" onclick="cargarTickets().then(()=>renderTickets())" style="margin-right:4px;">↻ Actualizar</button>
      <button class="btn-exit" onclick="doLogout()">Salir</button>
    </div>
  </div>

  <div class="layout">
    <nav class="sidebar" id="sidebar"></nav>
    <div class="content" id="content"></div>
  </div>
</div>

<!-- ══ DIRECTORIO FLOTANTE ══════════════════════════ -->

// CONFIGURACIÓN — API GOOGLE SHEETS
// ══════════════════════════════════════════════════════════
const API_URL = 'https://script.google.com/macros/s/AKfycbwnUgnQXuS-jhUUKPrjdTfSaEnDgDpU4YrUmZ5WYTlcaTz1Ybk8f4EPsbw3HeUxVcym/exec';

async function apiGet(action, params={}) {
  try {
    let url = API_URL + '?action=' + action;
    Object.entries(params).forEach(([k,v]) => url += '&' + k + '=' + encodeURIComponent(v));
    const r = await fetch(url);
    return await r.json();
  } catch(e) {
    return { ok: false, error: e.message };
  }
}

async function apiPost(body) {
  try {
    // Enviamos acción y datos como parámetros GET (evita CORS)
    const action = body.action;
    // Extraer el objeto de datos según la acción
    let dataObj = {};
    if (action === 'crearTicket')      dataObj = body.ticket;
    if (action === 'actualizarTicket') dataObj = body.ticket;
    if (action === 'agregarNota')      dataObj = {ticketId: body.ticketId, nota: body.nota};
    const url = API_URL + '?action=' + action + '&d=' + encodeURIComponent(JSON.stringify(dataObj));
    const r = await fetch(url);
    return await r.json();
  } catch(e) {
    return { ok: false, error: e.message };
  }
}

async function crearTicket(){
  const empresa  = document.getElementById('f-empresa').value.trim();
  const contacto = document.getElementById('f-contacto').value.trim();
  const desc     = document.getElementById('f-desc').value.trim();
  const email = document.getElementById('f-email').value.trim();
  if(!empresa||!contacto||!desc){
    showToast('Empresa, contacto y descripción son obligatorios','err'); return;
  }
  if(email && !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)){
    showToast('El correo electrónico no tiene un formato válido','err'); return;
  }
  const t={
    id:         '',
    empresa,
    contacto,
    tel:        document.getElementById('f-tel').value.trim(),
    email:      email,
    canal:      document.getElementById('f-canal').value,
    prioridad:  document.getElementById('f-prio').value,
    sucursal:      document.getElementById('f-sucursal').value.trim().toUpperCase(),
    ticketcliente: document.getElementById('f-ticketcliente').value.trim().toUpperCase(),
    dir:           document.getElementById('f-dir').value.trim(),
    indic:         document.getElementById('f-indic').value.trim(),
    supInstruc: '',
    desc:       desc.toUpperCase(),
    estatus:    'Abierto',
    tecnico:    '',
    tecnicoName:'',
    otFolio:    '',
    otFecha:    '',
    creadoPor:  session.name,
    fecha:      now(),
    notas:[nota('sistema','Ticket creado por '+session.name+'.')]
  };
  showToast('Guardando...','ok');
  const res = await apiPost({ action:'crearTicket', ticket:t });
  if(res.ok){
    t.id = res.data.id;
    tickets.unshift(t);
    limpiarForm();
    showToast('Ticket '+t.id+' creado','ok');
    if(session.role==='supervisor') openModal(t.id);
  } else {
    showToast('Error al guardar: '+res.error,'err');
  }
}

// RENDER: LISTA TICKETS

function renderTickets(){
  const r = session.role;
  let lista = tickets;
  if(r==='tecnico' && tecnicoNumero){
    // Normalizar: quitar ceros al inicio para comparar 001 = 1
    const normNum = String(tecnicoNumero).trim().replace(/^0+/, '') || '0';
    lista = tickets.filter(t=>{
      const tNum = String(t.tecnico||'').trim().replace(/^0+/, '') || '0';
      return tNum === normNum;
    });
  }

  // stats solo para supervisor/agente
  let statsHtml='';
  if(r!=='tecnico'){
    const ab=tickets.filter(t=>t.estatus==='Abierto').length;
    const pr=tickets.filter(t=>t.estatus==='En proceso').length;
    const rs=tickets.filter(t=>t.estatus==='Resuelto').length;
    const cl=tickets.filter(t=>t.estatus==='Cerrado').length;
    statsHtml=`<div class="stats-row">
      <div class="stat"><div class="n n-open">${ab}</div><div class="l">Abiertos</div></div>

  const filtros=['Todos','Abierto','En proceso','Resuelto','Cerrado'];

  ).join('');

        <td><span class="badge b-${statusKey(t.estatus)}">${t.estatus}</span></td>
        <td style="font-size:12px;color:var(--text2);">${t.tecnico?`<span style="font-family:var(--mono);color:var(--accent2);margin-right:4px;">${t.tecnico}</span>`:''}${t.tecnicoName||'<span style="color:var(--text3)">Sin asignar</span>'}</td>

  document.getElementById('content').innerHTML=`
    ${statsHtml}

      <div class="page-title">${title}</div>
      ${addBtn}
    </div>
    <div class="filters">${fhtml}</div>
    <div style="display:flex;justify-content:flex-end;align-items:center;gap:6px;margin-bottom:12px;">
      <span style="font-size:11px;color:var(--text2);">Filtrar por técnico:</span>

      </tr></thead>
      <tbody>${rows}</tbody>
    </table>`;
}

function statusKey(s){
  if(s==='Abierto')    return 'abierto';
  if(s==='En proceso') return 'proceso';
  if(s==='Resuelto')   return 'resuelto';
  return 'cerrado';
}

    controls=`

        <h4>Gestión del ticket</h4>
        ${t.indic?`<div style="background:rgba(210,153,34,.1);border:1px solid rgba(210,153,34,.25);border-radius:6px;padding:10px 12px;margin-bottom:12px;color:var(--warn2);font-size:12px;line-height:1.5;"><strong>⚠ Indicaciones especiales:</strong><br>${t.indic}</div>`:''}

        <button class="btn btn-purple btn-sm" style="margin-top:6px;" onclick="agregarNota('${t.id}','supervisor')">Guardar nota</button>

  if(r==='tecnico'){

      <div class="m-controls">

        <button class="btn btn-ok btn-sm" style="margin-top:6px;" onclick="agregarNota('${t.id}','tecnico')">Guardar nota</button>
      </div>`;
  }

  if(r==='agente'){
    controls=`
      <div class="m-controls">
        <h4>Agregar nota</h4>
        <textarea id="nota-${t.id}" style="width:100%;padding:8px 10px;background:var(--bg);border:1px solid var(--border);border-radius:6px;color:var(--text);font-family:var(--font);font-size:13px;resize:vertical;min-height:60px;outline:none;display:block;" placeholder="Información adicional del cliente..."></textarea>
        <button class="btn btn-ghost btn-sm" style="margin-top:6px;" onclick="agregarNota('${t.id}','agente')">Guardar nota</button>
      </div>`;
  }

  document.getElementById('modal-box').innerHTML=`
    <div class="modal-hdr">
      <div>
        <h3>${t.empresa} — ${t.contacto}</h3>
        <div class="modal-folio">${t.id} · Creado por ${t.creadoPor} · ${t.fecha}</div>

    <div class="modal-body">
      <div class="m-badges">
        <span class="badge b-${statusKey(t.estatus)}">${t.estatus}</span>

      </div>

        ${t.ticketcliente?`<div class="m-section"><div class="m-label">Ticket / Folio cliente</div><div class="m-val">${t.ticketcliente}</div></div>`:''}

      ${t.indic?`<div class="m-section"><div class="m-val" style="background:rgba(210,153,34,.08);border:1px solid rgba(210,153,34,.2);border-radius:6px;padding:8px 12px;color:var(--warn2);font-size:13px;">⚠ Indicaciones del cliente: ${t.indic}</div></div>`:''}
      ${t.supInstruc?`<div class="m-section"><div class="m-val" style="background:rgba(110,64,201,.08);border:1px solid rgba(110,64,201,.2);border-radius:6px;padding:8px 12px;color:var(--purple2);font-size:13px;">📋 Instrucciones del Supervisor: ${t.supInstruc}</div></div>`:''}

      ${otSection}${osSection}

}

async function asignarTecnico(id){
  const t=tickets.find(x=>x.id===id); if(!t) return;
  const numEl  = document.getElementById('tec-num-'+id);
  const nomEl  = document.getElementById('sel-tec-'+id);
  const numero = numEl ? numEl.value.trim() : '';
  const nombre = nomEl ? nomEl.value.trim() : '';
  if(!numero || !nombre){ showToast('Escribe número y nombre del técnico','err'); return; }
  t.tecnico     = numero.toUpperCase();
  t.tecnicoName = nombre.toUpperCase();
  const n1=nota('supervisor','Ticket asignado a '+t.tecnicoName+'.', session.name);
  t.notas.push(n1);
  if(t.estatus==='Abierto'){
    t.estatus='En proceso';
    const n2=nota('sistema','Estatus cambiado a En proceso.');
    t.notas.push(n2);
    await apiPost({action:'agregarNota', ticketId:id, nota:n2});
  }
  await apiPost({action:'actualizarTicket', ticket:t});
  await apiPost({action:'agregarNota', ticketId:id, nota:n1});
  showToast('Asignado a '+t.tecnicoName,'ok');
  openModal(id);
  if(activePage==='tickets') renderTickets();
}

async function generarOT(id){
  const t=tickets.find(x=>x.id===id); if(!t) return;
  if(!t.tecnico){ showToast('Asigna un técnico antes de generar la OT','err'); return; }
  t.otFolio = t.id.replace('TKT-','OT-');
  t.otFecha = now();
  const instrEl = document.getElementById('sup-instruc-'+id);
  if(instrEl && instrEl.value.trim()) t.supInstruc = instrEl.value.trim().toUpperCase();
  const n=nota('supervisor','OT/OS '+t.otFolio+' generada.', session.name);
  t.notas.push(n);
  await apiPost({action:'actualizarTicket', ticket:t});
  await apiPost({action:'agregarNota', ticketId:id, nota:n});
  showToast('OT/OS '+t.otFolio+' generada','ok');
  openModal(id);
}

function ligarOS(id){
  const t=tickets.find(x=>x.id===id); if(!t) return;
  const val=document.getElementById('os-input-'+id).value.trim();
  if(!val){ showToast('Ingresa el número de OS','err'); return; }
  t.osFolio=val;
  t.notas.push(nota('supervisor','Orden de Servicio '+val+' ligada al ticket.', session.name));
  showToast('OS '+val+' ligada','ok');
  openModal(id);
}

async function cambiarEstatus(id,nuevo){
  const t=tickets.find(x=>x.id===id); if(!t) return;
  t.estatus=nuevo;
  const n=nota('sistema','Estatus cambiado a "'+nuevo+'" por '+session.name+'.');
  t.notas.push(n);
  await apiPost({action:'actualizarTicket', ticket:t});
  await apiPost({action:'agregarNota', ticketId:id, nota:n});
  showToast('Estatus: '+nuevo,'ok');
  openModal(id);
  if(activePage==='tickets') renderTickets();
}

async function agregarNota(id,tipo){
  const t=tickets.find(x=>x.id===id); if(!t) return;
  const el=document.getElementById('nota-'+id);
  const txt=el.value.trim();
  if(!txt){ showToast('Escribe una nota','err'); return; }
  const n=nota(tipo,txt.toUpperCase(),session.name);
  t.notas.push(n);
  await apiPost({action:'agregarNota', ticketId:id, nota:n});
  el.value='';
  showToast('Nota guardada','ok');
  openModal(id);
}

        <button class="btn btn-ghost btn-sm" onclick="cambiarPassword('${k}')">Cambiar</button>
      </div>`).join('');

  document.getElementById('content').innerHTML=`
    <div class="page-header">

      <h3>Usuarios del sistema</h3>
      <p class="hint">Cambia las contraseñas de cada usuario. Los cambios aplican hasta que se recargue la página.</p>
      <div class="cfg-section">
        <h4>Usuarios activos</h4>
        ${usuariosHtml}
      </div>
    </div>

    <div class="cfg-card">
      <h3>Base de datos</h3>
      <p class="hint">Operaciones sobre los datos del sistema.</p>
      <div class="cfg-section">
        <h4>Estadísticas</h4>
        <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:12px;" id="cfg-stats">
          <div class="stat"><div class="n" style="color:var(--text2);font-size:20px;" id="cfg-total">—</div><div class="l">Total tickets</div></div>
          <div class="stat"><div class="n n-open" style="font-size:20px;" id="cfg-abiertos">—</div><div class="l">Abiertos</div></div>
          <div class="stat"><div class="n n-done" style="font-size:20px;" id="cfg-cerrados">—</div><div class="l">Cerrados</div></div>
        </div>
        <button class="btn btn-ghost btn-sm" onclick="cargarEstadisticas()">↻ Actualizar estadísticas</button>
      </div>
      <div class="cfg-section danger-zone">
        <h4>⚠ Zona de peligro</h4>
        <p style="font-size:12px;color:var(--text2);margin-bottom:12px;">Estas acciones no se pueden deshacer. Úsalas solo para reiniciar el sistema después de pruebas.</p>
        <div style="display:flex;gap:8px;flex-wrap:wrap;">
          <button class="btn btn-danger btn-sm" onclick="confirmarReset('tickets')">Borrar todos los tickets</button>
          <button class="btn btn-danger btn-sm" onclick="confirmarReset('folioNum')">Reiniciar contador de folios</button>
          <button class="btn btn-danger btn-sm" onclick="confirmarReset('todo')">Reiniciar todo el sistema</button>
        </div>
      </div>
    </div>`;

  cargarEstadisticas();
}

async function cargarEstadisticas(){
  const res = await apiGet('getTickets');
  if(res.ok){
    const t = res.data;
    document.getElementById('cfg-total').textContent    = t.length;
    document.getElementById('cfg-abiertos').textContent = t.filter(x=>x.estatus==='Abierto'||x.estatus==='En proceso').length;
    document.getElementById('cfg-cerrados').textContent = t.filter(x=>x.estatus==='Cerrado'||x.estatus==='Resuelto').length;
  }
}

function cambiarPassword(userKey){
  const el = document.getElementById('pwd-'+userKey);
  const nueva = el.value.trim();
  if(!nueva){ showToast('Escribe la nueva contraseña','err'); return; }
  USERS[userKey].pass = nueva;
  el.value='';
  showToast('Contraseña de '+USERS[userKey].name+' actualizada','ok');
}

async function confirmarReset(tipo){
  const msgs = {
    tickets:   '¿Borrar TODOS los tickets y notas? Esta acción no se puede deshacer.',
    folioNum:  '¿Reiniciar el contador de folios a 1?',
    todo:      '¿Reiniciar TODO el sistema? Se borrarán tickets, notas y el contador.',
  };
  if(!confirm(msgs[tipo])) return;
  showToast('Procesando...','ok');
  const res = await apiGet('reset', {tipo});
  if(res.ok){
    tickets=[];
    showToast('Sistema reiniciado correctamente','ok');
    cargarEstadisticas();
  } else {
    showToast('Error: '+res.error,'err');
  }
}

function imprimirOT(id){
  const t = tickets.find(x=>x.id===id);
  if(!t) return;
  showToast('Generando PDF...','ok');

  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({ orientation:'portrait', unit:'mm', format:'letter' });

  const pageW = 215.9;
  const margin = 15;
  const contentW = pageW - margin*2;
  let y = margin;

  // Solo negro y gris claro
  const negro   = [0, 0, 0];
  const gris    = [80, 80, 80];
  const grisCla = [160, 160, 160];

  // Helper: línea horizontal
  const hline = (yy) => { doc.setDrawColor(0); doc.line(margin, yy, pageW-margin, yy); };

  // ── ENCABEZADO ──────────────────────────────────────
  doc.setFontSize(13); doc.setFont('helvetica','bold'); doc.setTextColor(...negro);
  doc.text('CENTRO DE SERVICIOS EN COMUNICACION S.A. DE C.V.', margin, y+5);
  doc.setFontSize(8); doc.setFont('helvetica','normal'); doc.setTextColor(...gris);
  doc.text('Nubia #112, Col. Claveria, Azcapotzalco, CDMX  |  Tel. 49973448  |  www.csco.mx', margin, y+10);

  doc.setFontSize(16); doc.setFont('helvetica','bold'); doc.setTextColor(...negro);
  doc.text('ORDEN DE TRABAJO', pageW-margin, y+5, {align:'right'});
  doc.setFontSize(13);
  doc.text(t.otFolio||'', pageW-margin, y+12, {align:'right'});

  y += 15;
  hline(y); y += 4;

  doc.setFontSize(8); doc.setFont('helvetica','normal'); doc.setTextColor(...gris);
  doc.text('Ticket origen: '+(t.id||''), margin, y);
  doc.text('Emitida: '+(t.otFecha||''), pageW-margin, y, {align:'right'});
  y += 6;

  // ── ALERTAS ─────────────────────────────────────────
  if(t.indic){
    hline(y);
    y += 4;
    doc.setFontSize(8); doc.setFont('helvetica','bold'); doc.setTextColor(...negro);
    doc.text('INDICACIONES DEL CLIENTE:', margin, y);
    doc.setFont('helvetica','normal');
    const indicLines = doc.splitTextToSize(t.indic, contentW-55);
    doc.text(indicLines, margin+52, y);
    y += Math.max(5, indicLines.length * 4) + 2;
  }

  if(t.supInstruc){
    hline(y);
    y += 4;
    doc.setFontSize(8); doc.setFont('helvetica','bold'); doc.setTextColor(...negro);
    doc.text('INSTRUCCIONES DEL SUPERVISOR:', margin, y);
    doc.setFont('helvetica','normal');
    const supLines = doc.splitTextToSize(t.supInstruc, contentW-62);
    doc.text(supLines, margin+63, y);
    y += Math.max(5, supLines.length * 4) + 2;
  }

  // ── DATOS DEL CLIENTE ────────────────────────────────
  hline(y); y += 3;
  doc.setFontSize(9); doc.setFont('helvetica','bold'); doc.setTextColor(...negro);
  doc.text('DATOS DEL CLIENTE Y SERVICIO', margin, y+4);
  y += 7; hline(y); y += 3;

  const col1 = margin;
  const col2 = margin + contentW/2;
  doc.setFontSize(7);

  const campos = [
    ['EMPRESA / MARCA', t.empresa||'', 'CONTACTO', t.contacto||''],
    ['TELEFONO', t.tel||'—', 'CORREO', t.email||'—'],
    ['SUCURSAL', t.sucursal||'—', 'TICKET CLIENTE', t.ticketcliente||'—'],
    ['DIRECCION / UBICACION', t.dir||'—', 'CANAL DE REPORTE', t.canal||'—'],
    ['NO. EMPLEADO / TECNICO', (t.tecnico?t.tecnico+' — ':'')+( t.tecnicoName||'—'), 'PRIORIDAD', t.prioridad||'—'],
  ];

  campos.forEach(([l1,v1,l2,v2]) => {
    doc.setFont('helvetica','bold'); doc.setTextColor(...gris);
    doc.text(l1, col1, y); doc.text(l2, col2, y);
    y += 4;
    doc.setFont('helvetica','normal'); doc.setTextColor(...negro);
    doc.text(String(v1).substring(0,38), col1, y);
    doc.text(String(v2).substring(0,32), col2, y);
    y += 5;
  });

  // Fecha compromiso
  doc.setFont('helvetica','bold'); doc.setTextColor(...gris);
  doc.text('FECHA COMPROMISO', col1, y);
  doc.text('HORA', col2, y);
  y += 4;
  doc.line(col1, y, col1+60, y);
  doc.line(col2, y, col2+30, y);
  y += 6;

  // ── DESCRIPCION ──────────────────────────────────────
  hline(y); y += 3;
  doc.setFontSize(9); doc.setFont('helvetica','bold'); doc.setTextColor(...negro);
  doc.text('DESCRIPCION DEL TRABAJO A REALIZAR', margin, y+4);
  y += 7; hline(y); y += 3;

  doc.setFontSize(9); doc.setFont('helvetica','normal'); doc.setTextColor(...negro);
  const descLines = doc.splitTextToSize(t.desc||'', contentW);
  doc.text(descLines, margin, y);
  y += Math.max(18, descLines.length * 4.5 + 4);

  // ── MATERIALES ───────────────────────────────────────
  hline(y); y += 3;
  doc.setFontSize(9); doc.setFont('helvetica','bold'); doc.setTextColor(...negro);
  doc.text('MATERIALES Y EQUIPO A UTILIZAR  (completar antes de salir)', margin, y+4);
  y += 7; hline(y); y += 2;

  // Header tabla
  doc.setFontSize(7); doc.setFont('helvetica','bold'); doc.setTextColor(...gris);
  doc.text('#', margin+3, y+3);
  doc.text('MATERIAL / EQUIPO', margin+12, y+3);
  doc.text('NO. SERIE / PARTE', margin+120, y+3);
  doc.text('CANT', margin+170, y+3);
  y += 5; hline(y); y += 1;

  for(let r=1; r<=6; r++){
    doc.setFontSize(8); doc.setFont('helvetica','normal'); doc.setTextColor(...grisCla);
    doc.text(String(r), margin+4, y+5, {align:'center'});
    doc.line(margin+8, y, margin+8, y+7);
    doc.line(margin+115, y, margin+115, y+7);
    doc.line(margin+165, y, margin+165, y+7);
    doc.line(margin, y+7, pageW-margin, y+7);
    y += 7;
  }
  y += 4;

  // ── OBSERVACIONES ────────────────────────────────────
  hline(y); y += 3;
  doc.setFontSize(9); doc.setFont('helvetica','bold'); doc.setTextColor(...negro);
  doc.text('OBSERVACIONES DEL TECNICO  (completar al terminar)', margin, y+4);
  y += 7; hline(y);
  y += 14; hline(y); y += 4;

  doc.setFontSize(9); doc.setFont('helvetica','normal'); doc.setTextColor(...negro);
  doc.text('Servicio concluido:  SI [  ]   NO [  ]', margin, y);
  doc.text('Faltan actividades:  SI [  ]   NO [  ]', margin+80, y);
  y += 8;

  // ── FIRMAS ───────────────────────────────────────────
  hline(y); y += 3;
  const fw = contentW/3;
  const firmasData = ['ELABORO / SUPERVISOR','TECNICO RESPONSABLE','RECIBIDO CONFORME'];
  firmasData.forEach((f,i) => {
    const fx = margin + fw*i;
    doc.setFontSize(7); doc.setFont('helvetica','bold'); doc.setTextColor(...gris);
    doc.text(f, fx+2, y+3);
    doc.setFont('helvetica','normal'); doc.setTextColor(...grisCla);
    doc.text('Nombre:', fx+2, y+10);
    doc.line(fx+16, y+10, fx+fw-3, y+10);
    doc.text('Firma:', fx+2, y+16);
    doc.line(fx+14, y+16, fx+fw-3, y+16);
    doc.text('Fecha:', fx+2, y+22);
    doc.line(fx+14, y+22, fx+fw-3, y+22);
    if(i<2) doc.line(fx+fw-1, y, fx+fw-1, y+25);
  });
  y += 27;

  // ── PIE ──────────────────────────────────────────────
  hline(y); y += 3;
  doc.setFontSize(7); doc.setFont('helvetica','normal'); doc.setTextColor(...grisCla);
  doc.text('FOR-002  Rev.01  |  SGC ISO 9001:2015  |  CSCO', margin, y+3);
  doc.text('Generada: '+(t.otFecha||''), pageW-margin, y+3, {align:'right'});

  // ── GUARDAR ──────────────────────────────────────────
  doc.save((t.otFolio||'OT')+'.pdf');
  showToast('PDF '+(t.otFolio||'OT')+'.pdf descargado','ok');
}

// ══════════════════════════════════════════════════════════
// DIRECTORIO
// ══════════════════════════════════════════════════════════
function toggleDirectorio(){
  const panel = document.getElementById('dir-panel');
  panel.classList.toggle('open');
  if(panel.classList.contains('open')){
    renderDirectorio(DIRECTORIO);
    document.getElementById('dir-search').value='';
    document.getElementById('dir-search').focus();
  }
}

function filtrarDirectorio(q){
  const filtrado = q.trim()==='' ? DIRECTORIO :
    DIRECTORIO.filter(t=>
      t.num.includes(q.trim()) ||
      t.nombre.toLowerCase().includes(q.trim().toLowerCase())
    );
  renderDirectorio(filtrado);
}

function renderDirectorio(lista){
  const container = document.getElementById('dir-table');
  if(!lista.length){
    container.innerHTML='<div style="padding:16px;text-align:center;color:var(--text3);font-size:12px;">Sin resultados</div>';
    return;
  }
  container.innerHTML = lista.map(t=>`
    <div class="dir-row" onclick="copiarNumero('${t.num}','${t.nombre}')">
      <span class="num">${t.num}</span>
      <span class="nom">${t.nombre}</span>
    </div>`).join('');
}

function copiarNumero(num, nombre){
  // Copiar al portapapeles
  navigator.clipboard.writeText(num).then(()=>{
    showToast('Copiado: '+num+' — '+nombre,'ok');
  }).catch(()=>{
    showToast(num+' — '+nombre,'ok');
  });
}

// ══════════════════════════════════════════════════════════
// TOAST
// ══════════════════════════════════════════════════════════
function showToast(msg,type='ok'){
  const el=document.getElementById('toast');
  el.textContent=(type==='ok'?'✓ ':'✕ ')+msg;
  el.className='toast t-'+type+' show';
  setTimeout(()=>el.classList.remove('show'),2800);
}
