<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>CSCO — Mesa de Servicio [DEV]</title>
<meta name="theme-color" content="#1a5276">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="CSCO Mesa">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:       #0d1117;
  --s1:       #161b22;
  --s2:       #1c2128;
  --s3:       #21262d;
  --border:   #30363d;
  --border2:  #3d444d;
  --accent:   #1f6feb;
  --accent2:  #388bfd;
  --ok:       #238636;
  --ok2:      #2ea043;
  --warn:     #9e6a03;
  --warn2:    #d29922;
  --danger:   #b62324;
  --danger2:  #f85149;
  --purple:   #6e40c9;
  --purple2:  #a371f7;
  --text:     #e6edf3;
  --text2:    #8b949e;
  --text3:    #484f58;
  --radius:   8px;
  --font:     'IBM Plex Sans', sans-serif;
  --mono:     'IBM Plex Mono', monospace;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:var(--font);font-size:14px;min-height:100vh;}

/* ── SCROLLBAR ── */
::-webkit-scrollbar{width:6px;height:6px;}
::-webkit-scrollbar-track{background:var(--bg);}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px;}

/* ══ LOGIN ══════════════════════════════════════════════ */
#screen-login{
  min-height:100vh;display:flex;align-items:center;justify-content:center;
  background:radial-gradient(ellipse 80% 60% at 20% 50%, #0d2045 0%, var(--bg) 60%);
}
.login-wrap{width:360px;}
.login-brand{
  display:flex;align-items:center;gap:10px;margin-bottom:32px;
}
.login-brand .ico{
  width:36px;height:36px;border-radius:8px;
  background:linear-gradient(135deg,var(--accent),var(--purple));
  display:flex;align-items:center;justify-content:center;
  font-weight:700;font-size:15px;color:#fff;letter-spacing:-1px;
}
.login-brand .name{font-size:17px;font-weight:600;letter-spacing:-.3px;}
.login-brand .sub{font-size:11px;color:var(--text2);font-family:var(--mono);margin-top:2px;}
.login-card{
  background:var(--s1);border:1px solid var(--border);
  border-radius:12px;padding:28px;
}
.login-card h2{font-size:18px;font-weight:600;margin-bottom:4px;}
.login-card .hint{font-size:12px;color:var(--text2);margin-bottom:24px;}
.fg{margin-bottom:14px;}
.fg label{display:block;font-size:11px;font-weight:500;color:var(--text2);margin-bottom:5px;letter-spacing:.3px;text-transform:uppercase;}
.fg input,.fg select,.fg textarea{
  width:100%;padding:8px 12px;
  background:var(--bg);border:1px solid var(--border);
  border-radius:var(--radius);color:var(--text);font-family:var(--font);font-size:13px;
  outline:none;transition:border-color .15s;
}
.fg input:focus,.fg select:focus,.fg textarea:focus{border-color:var(--accent2);}
.fg textarea{resize:vertical;min-height:80px;line-height:1.5;}
.btn{
  display:inline-flex;align-items:center;gap:6px;
  padding:8px 16px;border-radius:var(--radius);border:none;
  font-family:var(--font);font-size:13px;font-weight:500;cursor:pointer;
  transition:opacity .15s,background .15s;
}
.btn:hover{opacity:.85;}
.btn-primary{background:var(--accent);color:#fff;width:100%;justify-content:center;padding:10px;}
.btn-ok{background:var(--ok);color:#fff;}
.btn-ghost{background:var(--s3);color:var(--text2);border:1px solid var(--border);}
.btn-danger{background:transparent;color:var(--danger2);border:1px solid var(--danger);}
.btn-sm{padding:5px 12px;font-size:12px;}
.btn-purple{background:var(--purple);color:#fff;}
.demo-hint{font-size:11px;color:var(--text3);text-align:center;margin-top:14px;line-height:1.7;font-family:var(--mono);}

/* ══ LAYOUT ══════════════════════════════════════════════ */
#screen-app{display:none;flex-direction:column;min-height:100vh;}

/* topbar */
.topbar{
  height:52px;background:var(--s1);border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
  padding:0 20px;position:sticky;top:0;z-index:100;
}
.tb-left{display:flex;align-items:center;gap:10px;}
.tb-brand{font-size:14px;font-weight:600;letter-spacing:-.2px;}
.tb-sep{color:var(--text3);font-size:16px;}
.tb-section{font-size:13px;color:var(--text2);}
.role-badge{
  font-size:10px;font-family:var(--mono);font-weight:500;letter-spacing:.5px;
  padding:2px 9px;border-radius:20px;text-transform:uppercase;
}
.rb-agente  {background:rgba(31,111,235,.15);color:var(--accent2);border:1px solid rgba(31,111,235,.3);}
.rb-supervisor{background:rgba(110,64,201,.15);color:var(--purple2);border:1px solid rgba(110,64,201,.3);}
.rb-tecnico {background:rgba(35,134,54,.15);color:#3fb950;border:1px solid rgba(35,134,54,.3);}
.rb-config  {background:rgba(248,81,73,.15);color:#f85149;border:1px solid rgba(248,81,73,.3);}
.tb-right{display:flex;align-items:center;gap:10px;}
.tb-user{font-size:12px;color:var(--text2);}
.btn-exit{
  background:none;border:1px solid var(--border);color:var(--text2);
  padding:4px 12px;border-radius:var(--radius);font-family:var(--font);font-size:12px;cursor:pointer;
}
.btn-exit:hover{border-color:var(--text2);color:var(--text);}

/* sidebar + content */
.layout{display:flex;flex:1;}
.sidebar{
  width:200px;background:var(--s1);border-right:1px solid var(--border);
  padding:16px 8px;flex-shrink:0;
}
.nav-group{margin-bottom:20px;}
.nav-label{font-size:10px;color:var(--text3);font-weight:500;letter-spacing:.8px;text-transform:uppercase;padding:0 8px;margin-bottom:6px;}
.nav-item{
  display:flex;align-items:center;gap:8px;
  padding:7px 10px;border-radius:6px;cursor:pointer;
  color:var(--text2);font-size:13px;font-weight:400;transition:all .15s;
  margin-bottom:2px;
}
.nav-item:hover{background:var(--s3);color:var(--text);}
.nav-item.active{background:rgba(31,111,235,.12);color:var(--accent2);}
.nav-item .ni-icon{font-size:14px;width:18px;text-align:center;}
.nav-badge{
  margin-left:auto;background:var(--danger2);color:#fff;
  font-size:10px;font-family:var(--mono);padding:1px 6px;border-radius:10px;
}

.content{flex:1;padding:24px;overflow-y:auto;max-height:calc(100vh - 52px);}
.page{display:none;}
.page.active{display:block;}

/* ══ STATS ═══════════════════════════════════════════════ */
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:24px;}
.stat{
  background:var(--s1);border:1px solid var(--border);
  border-radius:var(--radius);padding:16px;
}
.stat .n{font-size:30px;font-weight:600;font-family:var(--mono);line-height:1;}
.stat .l{font-size:11px;color:var(--text2);margin-top:4px;}
.n-open{color:var(--warn2);}
.n-prog{color:var(--accent2);}
.n-done{color:#3fb950;}
.n-cls {color:var(--text3);}

/* ══ TABLA TICKETS ══════════════════════════════════════ */
.page-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;}
.page-title{font-size:16px;font-weight:600;}
.filters{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px;}
.fbtn{
  padding:4px 12px;border-radius:20px;font-size:12px;font-weight:500;cursor:pointer;
  background:var(--s2);border:1px solid var(--border);color:var(--text2);
  transition:all .15s;font-family:var(--font);
}
.fbtn.active,.fbtn:hover{background:var(--accent);border-color:var(--accent);color:#fff;}

.tkt-table{width:100%;border-collapse:collapse;}
.tkt-table th{
  text-align:left;font-size:11px;font-weight:500;color:var(--text2);
  letter-spacing:.4px;text-transform:uppercase;padding:8px 12px;
  border-bottom:1px solid var(--border);background:var(--s1);
}
.tkt-table th:first-child{border-radius:var(--radius) 0 0 0;}
.tkt-table th:last-child{border-radius:0 var(--radius) 0 0;}
.tkt-row{
  border-bottom:1px solid var(--border);cursor:pointer;
  transition:background .12s;
}
.tkt-row:hover{background:var(--s2);}
.tkt-row td{padding:10px 12px;font-size:13px;vertical-align:middle;}
.folio{font-family:var(--mono);font-size:11px;color:var(--text3);}
.tkt-title{font-weight:500;margin-bottom:2px;}
.tkt-cliente{font-size:11px;color:var(--text2);}
.empty{text-align:center;padding:48px;color:var(--text3);}
.empty .e-icon{font-size:32px;margin-bottom:10px;}

/* badges */
.badge{
  display:inline-block;font-size:10px;font-family:var(--mono);font-weight:500;
  padding:2px 8px;border-radius:4px;white-space:nowrap;
}
.b-abierto {background:rgba(210,153,34,.12);color:var(--warn2);border:1px solid rgba(210,153,34,.2);}
.b-proceso  {background:rgba(56,139,253,.12);color:var(--accent2);border:1px solid rgba(56,139,253,.2);}
.b-resuelto {background:rgba(63,185,80,.12);color:#3fb950;border:1px solid rgba(63,185,80,.2);}
.b-cerrado  {background:rgba(72,79,88,.12);color:var(--text3);border:1px solid rgba(72,79,88,.2);}
.b-alta  {background:rgba(248,81,73,.12);color:var(--danger2);}
.b-media {background:rgba(210,153,34,.1);color:var(--warn2);}
.b-baja  {background:rgba(63,185,80,.1);color:#3fb950;}
.b-sin   {background:var(--s3);color:var(--text3);}

/* ══ FORMULARIO NUEVO TICKET ════════════════════════════ */
.form-card{
  background:var(--s1);border:1px solid var(--border);
  border-radius:var(--radius);padding:24px;max-width:760px;
}
.form-card h3{font-size:15px;font-weight:600;margin-bottom:20px;padding-bottom:12px;border-bottom:1px solid var(--border);}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.form-full{grid-column:1/-1;}
.form-actions{margin-top:20px;display:flex;gap:10px;}

/* ══ MODAL ═══════════════════════════════════════════════ */
.overlay{
  display:none;position:fixed;inset:0;
  background:rgba(0,0,0,.75);z-index:300;
  align-items:flex-start;justify-content:center;padding:24px;overflow-y:auto;
}
.overlay.open{display:flex;}
.modal{
  background:var(--s1);border:1px solid var(--border);
  border-radius:12px;width:100%;max-width:600px;margin:auto;
  animation:fadeUp .2s ease;
}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:translateY(0);}}
.modal-hdr{
  padding:18px 22px 14px;border-bottom:1px solid var(--border);
  display:flex;justify-content:space-between;align-items:flex-start;
}
.modal-hdr h3{font-size:15px;font-weight:600;}
.modal-folio{font-family:var(--mono);font-size:11px;color:var(--text3);margin-top:3px;}
.btn-cls{background:none;border:none;color:var(--text2);font-size:20px;cursor:pointer;line-height:1;padding:2px 4px;}
.btn-cls:hover{color:var(--text);}
.modal-body{padding:18px 22px;}
.m-badges{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px;}
.m-section{margin-bottom:16px;}
.m-label{font-size:11px;color:var(--text2);font-weight:500;letter-spacing:.3px;text-transform:uppercase;margin-bottom:5px;}
.m-val{font-size:13px;line-height:1.5;}
.m-box{
  background:var(--bg);border:1px solid var(--border);
  border-radius:6px;padding:10px 12px;font-size:13px;
  color:var(--text2);line-height:1.6;
}
.m-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px;}

/* historial */
.history{margin-bottom:16px;}
.history h4{font-size:12px;color:var(--text2);font-weight:500;text-transform:uppercase;letter-spacing:.4px;margin-bottom:10px;}
.note{padding:9px 12px;border-radius:6px;margin-bottom:6px;font-size:12px;line-height:1.5;}
.note-agente{background:rgba(31,111,235,.07);border-left:3px solid var(--accent);}
.note-supervisor{background:rgba(110,64,201,.07);border-left:3px solid var(--purple);}
.note-sistema{background:var(--bg);border-left:3px solid var(--border);color:var(--text2);}
.note-tecnico{background:rgba(35,134,54,.07);border-left:3px solid var(--ok2);}
.note-meta{font-size:10px;color:var(--text3);margin-top:4px;font-family:var(--mono);}

/* controles modal */
.m-controls{border-top:1px solid var(--border);padding-top:16px;margin-top:4px;}
.m-controls h4{font-size:12px;color:var(--text2);font-weight:500;text-transform:uppercase;letter-spacing:.4px;margin-bottom:12px;}
.ctrl-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px;}
.btn-ot{
  width:100%;padding:9px;border-radius:var(--radius);border:1px dashed var(--ok2);
  background:rgba(35,134,54,.06);color:#3fb950;font-family:var(--font);font-size:13px;
  font-weight:500;cursor:pointer;margin-bottom:12px;transition:all .15s;
}
.btn-ot:hover{background:rgba(35,134,54,.14);border-style:solid;}

/* Orden de Trabajo */
.ot-card{
  background:var(--bg);border:1px solid var(--border);
  border-radius:8px;padding:16px;margin-bottom:12px;
}
.ot-card h4{font-size:13px;font-weight:600;margin-bottom:12px;color:var(--accent2);}
.ot-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;}

/* ══ TOAST ═══════════════════════════════════════════════ */
.toast{
  position:fixed;bottom:24px;right:24px;z-index:999;
  background:var(--s2);border:1px solid var(--border);
  border-radius:8px;padding:10px 16px;font-size:13px;
  display:flex;align-items:center;gap:8px;
  transform:translateY(60px);opacity:0;transition:all .25s;pointer-events:none;
}
.toast.show{transform:translateY(0);opacity:1;}
.toast.t-ok{border-color:var(--ok2);color:#3fb950;}
.toast.t-err{border-color:var(--danger2);color:var(--danger2);}

/* ══ PRINT OT ════════════════════════════════════════════ */
#ot-print{display:none;}
@media print{
  body>*{display:none!important;}
  #ot-print{
    display:block!important;font-family:'IBM Plex Sans',sans-serif;
    color:#000;padding:24px;font-size:12px;
  }
  .ot-print-header{border-bottom:2px solid #000;padding-bottom:12px;margin-bottom:16px;}
  .ot-print-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px;}
  .ot-field label{font-size:10px;font-weight:600;text-transform:uppercase;display:block;margin-bottom:2px;}
  .ot-field span{border-bottom:1px solid #ccc;display:block;padding-bottom:4px;min-height:20px;}
  .ot-desc{border:1px solid #ccc;padding:8px;min-height:60px;margin-bottom:12px;}
  .ot-firma{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;margin-top:24px;}
  .ot-firma-box{border-top:1px solid #000;padding-top:6px;font-size:10px;}
}

/* Todos los campos en mayúsculas */
input[type="text"], input[type="number"], input[type="email"], 
input[type="password"], textarea {
  text-transform: uppercase;
}
/* Excepciones: password, email y campos específicos NO en mayúsculas */
input[type="password"], input[type="email"],
input#f-email, input#li-pass, input#li-user {
  text-transform: none !important;
}
@media(max-width:700px){
  .sidebar{display:none;}
  .stats-row{grid-template-columns:1fr 1fr;}
  .form-grid{grid-template-columns:1fr;}
  .m-grid{grid-template-columns:1fr;}
  .ot-row{grid-template-columns:1fr;}
}
/* ══ DIRECTORIO FLOTANTE ════════════════════════════ */
.dir-btn{
  position:fixed;bottom:24px;right:24px;z-index:200;
  background:var(--accent);color:#fff;border:none;
  border-radius:50%;width:48px;height:48px;font-size:20px;
  cursor:pointer;box-shadow:0 4px 12px rgba(0,0,0,.4);
  display:none;align-items:center;justify-content:center;
  transition:background .15s;
}
.dir-btn:hover{background:var(--accent2);}
.dir-panel{
  position:fixed;bottom:82px;right:24px;z-index:200;
  background:var(--s1);border:1px solid var(--border);
  border-radius:12px;width:280px;
  box-shadow:0 8px 24px rgba(0,0,0,.5);
  display:none;flex-direction:column;overflow:hidden;
}
.dir-panel.open{display:flex;}
.dir-hdr{
  background:var(--accent);padding:12px 16px;
  display:flex;justify-content:space-between;align-items:center;
}
.dir-hdr span{font-size:13px;font-weight:600;color:#fff;}
.dir-hdr button{background:none;border:none;color:#fff;font-size:18px;cursor:pointer;line-height:1;}
.dir-search{padding:8px 12px;border-bottom:1px solid var(--border);}
.dir-search input{
  width:100%;padding:6px 10px;background:var(--bg);
  border:1px solid var(--border);border-radius:6px;
  color:var(--text);font-family:var(--font);font-size:12px;outline:none;
}
.dir-table{overflow-y:auto;max-height:280px;}
.dir-row{
  display:grid;grid-template-columns:70px 1fr;
  padding:8px 12px;border-bottom:1px solid var(--border);
  cursor:pointer;transition:background .12s;font-size:12px;
}
.dir-row:hover{background:var(--s3);}
.dir-row .num{font-family:var(--mono);color:var(--accent2);font-weight:600;}
.dir-row .nom{color:var(--text);}
/* ══ CONFIG PANEL ════════════════════════════════════ */
.cfg-card{background:var(--s1);border:1px solid var(--border);border-radius:var(--radius);padding:24px;max-width:600px;margin-bottom:16px;}
.cfg-card h3{font-size:14px;font-weight:600;margin-bottom:4px;}
.cfg-card .hint{font-size:12px;color:var(--text2);margin-bottom:16px;}
.cfg-section{margin-bottom:20px;padding-bottom:20px;border-bottom:1px solid var(--border);}
.cfg-section:last-child{border-bottom:none;margin-bottom:0;padding-bottom:0;}
.cfg-section h4{font-size:12px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.4px;margin-bottom:12px;}
.user-row{display:flex;align-items:center;gap:8px;margin-bottom:8px;padding:8px 10px;background:var(--bg);border:1px solid var(--border);border-radius:6px;}
.user-row .u-name{flex:1;font-size:13px;}
.user-row .u-role{font-size:11px;color:var(--text2);}
.danger-zone{background:rgba(248,81,73,.05);border:1px solid rgba(248,81,73,.2);border-radius:var(--radius);padding:16px;}
.danger-zone h4{color:var(--danger2);}

/* ══ PROYECTOS ══════════════════════════════════════════ */
.proy-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:24px;}
.proy-stat{background:var(--s1);border:1px solid var(--border);border-radius:var(--radius);padding:14px;}
.proy-stat .n{font-size:26px;font-weight:600;font-family:var(--mono);line-height:1;}
.proy-stat .l{font-size:11px;color:var(--text2);margin-top:4px;}
.proy-table{width:100%;border-collapse:collapse;}
.proy-table th{text-align:left;font-size:11px;font-weight:500;color:var(--text2);
  letter-spacing:.4px;text-transform:uppercase;padding:8px 12px;
  border-bottom:1px solid var(--border);background:var(--s1);}
.proy-row{border-bottom:1px solid var(--border);cursor:pointer;transition:background .12s;}
.proy-row:hover{background:var(--s2);}
.proy-row td{padding:10px 12px;font-size:13px;vertical-align:middle;}
.semaforo{display:inline-block;width:10px;height:10px;border-radius:50%;margin-right:6px;}
.sem-verde{background:#3fb950;}
.sem-amarillo{background:var(--warn2);}
.sem-rojo{background:var(--danger2);}
.proy-progress{background:var(--s3);border-radius:4px;height:6px;width:100%;min-width:80px;}
.proy-progress-bar{height:6px;border-radius:4px;background:var(--accent2);transition:width .3s;}
.b-migracion{background:rgba(56,139,253,.12);color:var(--accent2);border:1px solid rgba(56,139,253,.2);}
.b-rollout{background:rgba(110,64,201,.12);color:var(--purple2);border:1px solid rgba(110,64,201,.2);}
.b-apertura{background:rgba(63,185,80,.12);color:#3fb950;border:1px solid rgba(63,185,80,.2);}
.b-remodelacion{background:rgba(210,153,34,.12);color:var(--warn2);border:1px solid rgba(210,153,34,.2);}
.b-activo{background:rgba(63,185,80,.1);color:#3fb950;}

// ══════════════════════════════════════════════════════════
// CONFIGURACIÓN — API GOOGLE SHEETS
// ══════════════════════════════════════════════════════════
const API_URL = 'https://script.google.com/macros/s/AKfycbzrgQzD-Rv8O6WSiQ6I90KuvCmS59DNKARHLanqyC5muj_wDIy1w0lKBlTRUqF78DyYkA/exec';

async function apiGet(action, params={}) {
  try {
    let url = API_URL + '?action=' + action;
    Object.entries(params).forEach(([k,v]) => url += '&' + k + '=' + encodeURIComponent(v));
    const r = await fetch(url);
    return await r.json();
  } catch(e) {
    return { ok: false, error: e.message };
  }
}

async function apiPost(body) {
  try {
    const action = body.action;
    let dataObj = {};
    if (action === 'crearTicket')        dataObj = body.ticket;
    if (action === 'actualizarTicket')   dataObj = body.ticket;
    if (action === 'agregarNota')        dataObj = {ticketId: body.ticketId, nota: body.nota};
    if (action === 'crearProyecto')      dataObj = body.ticket;
    if (action === 'actualizarProyecto') dataObj = body.proy;
    if (action === 'actualizarSucursal') dataObj = body.data;
    if (action === 'agregarSucursal')    dataObj = body.data;
    const url = API_URL + '?action=' + action + '&d=' + encodeURIComponent(JSON.stringify(dataObj));
    const r = await fetch(url);
    return await r.json();
  } catch(e) {
    return { ok: false, error: e.message };
  }
}

// ══════════════════════════════════════════════════════════

// ══════════════════════════════════════════════════════════

async function doLogin(){

  document.getElementById('screen-app').style.display='flex';

async function confirmarNumero(verTodos=false){
  if(!verTodos){

    document.getElementById('tb-user').textContent = session.name;
  } else {
    tecnicoNumero = '';
  }
  showToast('Cargando tickets...','ok');
  await cargarTickets();
  navTo('tickets');
}

async function cargarTickets(){
  const res = await apiGet('getTickets');
  if(res.ok && Array.isArray(res.data)){
    tickets = res.data;
    // Actualizar folioNum local para que no colisione
    folioNum = tickets.length + 1;

}

function navTo(page){
  activePage=page;
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
  const baseEl=document.getElementById('nav-'+page.split(':')[0]);
  if(baseEl) baseEl.classList.add('active');
  if(page==='nuevo')              renderNuevo();
  else if(page==='tickets')       renderTickets();
  else if(page==='config')        renderConfig();
  else if(page==='proyectos')     renderProyectos();
  else if(page==='nuevo-proyecto') renderNuevoProyecto();
  else if(page.startsWith('detalle-proyecto:')) renderDetalleProyecto(page.split(':')[1]);
}

function limpiarForm(){
  ['f-empresa','f-contacto','f-tel','f-email','f-sucursal','f-ticketcliente','f-dir','f-indic','f-desc'].forEach(id=>{
    const el=document.getElementById(id);
    if(el) el.value='';
  });
}

async function crearTicket(){
  const empresa  = document.getElementById('f-empresa').value.trim();
  const contacto = document.getElementById('f-contacto').value.trim();
  const desc     = document.getElementById('f-desc').value.trim();
  const email = document.getElementById('f-email').value.trim();
  if(!empresa||!contacto||!desc){
    showToast('Empresa, contacto y descripción son obligatorios','err'); return;
  }
  if(email && !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)){
    showToast('El correo electrónico no tiene un formato válido','err'); return;
  }
  const t={
    id:         '',
    empresa,
    contacto,
    tel:        document.getElementById('f-tel').value.trim(),
    email:      email,
    canal:      document.getElementById('f-canal').value,
    prioridad:  document.getElementById('f-prio').value,
    sucursal:      document.getElementById('f-sucursal').value.trim().toUpperCase(),
    ticketcliente: document.getElementById('f-ticketcliente').value.trim().toUpperCase(),
    dir:           document.getElementById('f-dir').value.trim(),
    indic:         document.getElementById('f-indic').value.trim(),
    supInstruc: '',
    desc:       desc.toUpperCase(),
    estatus:    'Abierto',
    tecnico:    '',
    tecnicoName:'',
    otFolio:    '',
    otFecha:    '',
    creadoPor:  session.name,
    fecha:      now(),
    notas:[nota('sistema','Ticket creado por '+session.name+'.')]
  };
  showToast('Guardando...','ok');
  const res = await apiPost({ action:'crearTicket', ticket:t });
  if(res.ok){
    t.id = res.data.id;
    tickets.unshift(t);
    limpiarForm();
    showToast('Ticket '+t.id+' creado','ok');
    if(session.role==='supervisor') openModal(t.id);
  } else {
    showToast('Error al guardar: '+res.error,'err');
  }
}

        onkeydown="if(event.key==='Enter')setTecFilter(this.value)"
        onblur="setTecFilter(this.value)"
        style="width:160px;padding:4px 8px;background:var(--bg);border:1px solid var(--border);
        border-radius:20px;color:var(--text);font-family:var(--font);font-size:12px;outline:none;">
      ${activeTecFilter?'<button class="fbtn" onclick="setTecFilter(\'\')" style="padding:4px 8px;">&#x2715;</button>':''}}
    </div>`;

  let filtered = activeFilter==='Todos' ? lista : lista.filter(t=>t.estatus===activeFilter);
  if(activeTecFilter){
    const tf = activeTecFilter.trim().toLowerCase();
    filtered = filtered.filter(t=>
      String(t.tecnico||'').trim().toLowerCase().includes(tf) ||
      String(t.tecnicoName||'').trim().toLowerCase().includes(tf)
    );
  }

  let rows='';
  if(!filtered.length){
    rows=`<tr><td colspan="7"><div class="empty"><div class="e-icon">📋</div>Sin tickets en este filtro</div></td></tr>`;
  } else {
    rows=filtered.map(t=>`
      <tr class="tkt-row" onclick="openModal('${t.id}')">
        <td><div class="folio">${t.id}</div></td>
        <td>
          <div class="tkt-title">${t.empresa}</div>
          <div class="tkt-cliente">${t.contacto}</div>
        </td>
        <td style="max-width:240px;color:var(--text2);font-size:12px;">${t.desc.substring(0,70)}${t.desc.length>70?'…':''}</td>
        <td><span class="badge b-${t.prioridad.toLowerCase()}">${t.prioridad}</span></td>
        <td><span class="badge b-${statusKey(t.estatus)}">${t.estatus}</span></td>
        <td style="font-size:12px;color:var(--text2);">${t.tecnico?`<span style="font-family:var(--mono);color:var(--accent2);margin-right:4px;">${t.tecnico}</span>`:''}${t.tecnicoName||'<span style="color:var(--text3)">Sin asignar</span>'}</td>
        <td style="font-size:11px;color:var(--text3);font-family:var(--mono);">${t.fecha}</td>
      </tr>`).join('');
  }

  const title = r==='tecnico' ? 'Mis asignaciones' : 'Todos los tickets';
  const addBtn = (r==='agente'||r==='supervisor')
    ? `<button class="btn btn-ok btn-sm" onclick="navTo('nuevo')">＋ Nuevo ticket</button>` : '';

  document.getElementById('content').innerHTML=`
    ${statsHtml}
    <div class="page-header">
      <div class="page-title">${title}</div>
      ${addBtn}
    </div>
    <div class="filters">${fhtml}</div>
    <div style="display:flex;justify-content:flex-end;align-items:center;gap:6px;margin-bottom:12px;">
      <span style="font-size:11px;color:var(--text2);">Filtrar por técnico:</span>
      <input type="text" id="filtro-tec" placeholder="No. empleado o nombre"
        style="width:180px;padding:5px 10px;background:var(--bg);border:1px solid var(--border);
        border-radius:20px;color:var(--text);font-family:var(--font);font-size:12px;outline:none;"
        onkeydown="if(event.key==='Enter'){activeTecFilter=this.value;renderTickets();}">
      <button class="fbtn" style="padding:5px 12px;"
        onclick="activeTecFilter=document.getElementById('filtro-tec').value;renderTickets();">Buscar</button>
      <button class="fbtn" style="padding:5px 10px;"
        onclick="activeTecFilter='';document.getElementById('filtro-tec').value='';renderTickets();">✕ Limpiar</button>
    </div>
    <table class="tkt-table">
      <thead><tr>
        <th>Folio</th><th>Cliente</th><th>Descripción</th>
        <th>Prioridad</th><th>Estatus</th><th>Técnico</th><th>Fecha</th>
      </tr></thead>
      <tbody>${rows}</tbody>
    </table>`;
}

function statusKey(s){
  if(s==='Abierto')    return 'abierto';
  if(s==='En proceso') return 'proceso';
  if(s==='Resuelto')   return 'resuelto';
  return 'cerrado';
}

function setFilter(f){
  activeFilter=f;
  renderTickets();
}

async function asignarTecnico(id){
  const t=tickets.find(x=>x.id===id); if(!t) return;
  const numEl  = document.getElementById('tec-num-'+id);
  const nomEl  = document.getElementById('sel-tec-'+id);
  const numero = numEl ? numEl.value.trim() : '';
  const nombre = nomEl ? nomEl.value.trim() : '';
  if(!numero || !nombre){ showToast('Escribe número y nombre del técnico','err'); return; }
  t.tecnico     = numero.toUpperCase();
  t.tecnicoName = nombre.toUpperCase();
  const n1=nota('supervisor','Ticket asignado a '+t.tecnicoName+'.', session.name);
  t.notas.push(n1);
  if(t.estatus==='Abierto'){
    t.estatus='En proceso';
    const n2=nota('sistema','Estatus cambiado a En proceso.');
    t.notas.push(n2);
    await apiPost({action:'agregarNota', ticketId:id, nota:n2});
  }
  await apiPost({action:'actualizarTicket', ticket:t});
  await apiPost({action:'agregarNota', ticketId:id, nota:n1});
  showToast('Asignado a '+t.tecnicoName,'ok');
  openModal(id);
  if(activePage==='tickets') renderTickets();
}

async function generarOT(id){
  const t=tickets.find(x=>x.id===id); if(!t) return;
  if(!t.tecnico){ showToast('Asigna un técnico antes de generar la OT','err'); return; }
  t.otFolio = t.id.replace('TKT-','OT-');
  t.otFecha = now();
  const instrEl = document.getElementById('sup-instruc-'+id);
  if(instrEl && instrEl.value.trim()) t.supInstruc = instrEl.value.trim().toUpperCase();
  const n=nota('supervisor','OT/OS '+t.otFolio+' generada.', session.name);
  t.notas.push(n);
  await apiPost({action:'actualizarTicket', ticket:t});
  await apiPost({action:'agregarNota', ticketId:id, nota:n});
  showToast('OT/OS '+t.otFolio+' generada','ok');
  openModal(id);
}

function ligarOS(id){
  const t=tickets.find(x=>x.id===id); if(!t) return;
  const val=document.getElementById('os-input-'+id).value.trim();
  if(!val){ showToast('Ingresa el número de OS','err'); return; }
  t.osFolio=val;
  t.notas.push(nota('supervisor','Orden de Servicio '+val+' ligada al ticket.', session.name));
  showToast('OS '+val+' ligada','ok');
  openModal(id);
}

async function cambiarEstatus(id,nuevo){
  const t=tickets.find(x=>x.id===id); if(!t) return;
  t.estatus=nuevo;
  const n=nota('sistema','Estatus cambiado a "'+nuevo+'" por '+session.name+'.');
  t.notas.push(n);
  await apiPost({action:'actualizarTicket', ticket:t});
  await apiPost({action:'agregarNota', ticketId:id, nota:n});
  showToast('Estatus: '+nuevo,'ok');
  openModal(id);
  if(activePage==='tickets') renderTickets();
}

async function agregarNota(id,tipo){
  const t=tickets.find(x=>x.id===id); if(!t) return;
  const el=document.getElementById('nota-'+id);
  const txt=el.value.trim();
  if(!txt){ showToast('Escribe una nota','err'); return; }
  const n=nota(tipo,txt.toUpperCase(),session.name);
  t.notas.push(n);
  await apiPost({action:'agregarNota', ticketId:id, nota:n});
  el.value='';
  showToast('Nota guardada','ok');
  openModal(id);
}

        <h4>Estadísticas</h4>
        <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:12px;" id="cfg-stats">
          <div class="stat"><div class="n" style="color:var(--text2);font-size:20px;" id="cfg-total">—</div><div class="l">Total tickets</div></div>
          <div class="stat"><div class="n n-open" style="font-size:20px;" id="cfg-abiertos">—</div><div class="l">Abiertos</div></div>
          <div class="stat"><div class="n n-done" style="font-size:20px;" id="cfg-cerrados">—</div><div class="l">Cerrados</div></div>

        <button class="btn btn-ghost btn-sm" onclick="cargarEstadisticas()">↻ Actualizar estadísticas</button>
      </div>

        <h4>⚠ Zona de peligro</h4>
        <p style="font-size:12px;color:var(--text2);margin-bottom:12px;">Estas acciones no se pueden deshacer. Úsalas solo para reiniciar el sistema después de pruebas.</p>

          <button class="btn btn-danger btn-sm" onclick="confirmarReset('tickets')">Borrar todos los tickets</button>
          <button class="btn btn-danger btn-sm" onclick="confirmarReset('folioNum')">Reiniciar contador de folios</button>
          <button class="btn btn-danger btn-sm" onclick="confirmarReset('todo')">Reiniciar todo el sistema</button>
        </div>

async function cargarEstadisticas(){
  const res = await apiGet('getTickets');
  if(res.ok){
    const t = res.data;
    document.getElementById('cfg-total').textContent    = t.length;
    document.getElementById('cfg-abiertos').textContent = t.filter(x=>x.estatus==='Abierto'||x.estatus==='En proceso').length;
    document.getElementById('cfg-cerrados').textContent = t.filter(x=>x.estatus==='Cerrado'||x.estatus==='Resuelto').length;
  }
}

function cambiarPassword(userKey){
  const el = document.getElementById('pwd-'+userKey);
  const nueva = el.value.trim();
  if(!nueva){ showToast('Escribe la nueva contraseña','err'); return; }
  USERS[userKey].pass = nueva;
  el.value='';
  showToast('Contraseña de '+USERS[userKey].name+' actualizada','ok');
}

async function confirmarReset(tipo){
  const msgs = {
    tickets:   '¿Borrar TODOS los tickets y notas? Esta acción no se puede deshacer.',
    folioNum:  '¿Reiniciar el contador de folios a 1?',
    todo:      '¿Reiniciar TODO el sistema? Se borrarán tickets, notas y el contador.',
  };
  if(!confirm(msgs[tipo])) return;
  showToast('Procesando...','ok');
  const res = await apiGet('reset', {tipo});
  if(res.ok){
    tickets=[];
    showToast('Sistema reiniciado correctamente','ok');
    cargarEstadisticas();
  } else {
    showToast('Error: '+res.error,'err');
  }
}

function imprimirOT(id){
  const t = tickets.find(x=>x.id===id);
  if(!t) return;
  showToast('Generando PDF...','ok');

  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({ orientation:'portrait', unit:'mm', format:'letter' });

  const pageW = 215.9;
  const margin = 15;
  const contentW = pageW - margin*2;
  let y = margin;

  // Solo negro y gris claro
  const negro   = [0, 0, 0];
  const gris    = [80, 80, 80];
  const grisCla = [160, 160, 160];

  // Helper: línea horizontal
  const hline = (yy) => { doc.setDrawColor(0); doc.line(margin, yy, pageW-margin, yy); };

  // ── ENCABEZADO ──────────────────────────────────────
  doc.setFontSize(13); doc.setFont('helvetica','bold'); doc.setTextColor(...negro);
  doc.text('CENTRO DE SERVICIOS EN COMUNICACION S.A. DE C.V.', margin, y+5);
  doc.setFontSize(8); doc.setFont('helvetica','normal'); doc.setTextColor(...gris);
  doc.text('Nubia #112, Col. Claveria, Azcapotzalco, CDMX  |  Tel. 49973448  |  www.csco.mx', margin, y+10);

  doc.setFontSize(16); doc.setFont('helvetica','bold'); doc.setTextColor(...negro);
  doc.text('ORDEN DE TRABAJO', pageW-margin, y+5, {align:'right'});
  doc.setFontSize(13);
  doc.text(t.otFolio||'', pageW-margin, y+12, {align:'right'});

  y += 15;
  hline(y); y += 4;

  doc.setFontSize(8); doc.setFont('helvetica','normal'); doc.setTextColor(...gris);

let proyectos = [];

async function cargarProyectos(){
  const res = await apiGet('getProyectos');
  if(res.ok && Array.isArray(res.data)){
    proyectos = res.data;
    // Normalizar fechas que vienen de Sheets como ISO string
    proyectos.forEach(p=>{
      p.sucursales.forEach(s=>{
        if(s.fechaProg) s.fechaProg = normalizarFecha(s.fechaProg);
      });
    });
  } else {
    showToast('Sin conexión proyectos — modo local','err');
  }
}

function normalizarFecha(f){
  if(!f) return '';
  // Si ya está en formato yyyy-MM-dd, dejarlo
  if(/^\d{4}-\d{2}-\d{2}$/.test(String(f))) return f;
  // Si viene como ISO o Date object
  const d = new Date(f);
  if(!isNaN(d)){
    return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
  }
  // Si viene como dd/mm/yyyy
  if(String(f).includes('/')){
    const [dd,mm,yyyy] = String(f).split('/');
    return yyyy+'-'+mm.padStart(2,'0')+'-'+dd.padStart(2,'0');
  }
  return f;
}

function calcSemaforo(proy){
  const total = proy.sucursales.filter(s=>s.estatus!=='Cancelada').length;
  if(!total) return 'verde';
  const ejecutadas = proy.sucursales.filter(s=>s.estatus==='Ejecutada'||s.estatus==='Documentada').length;
  const pct = ejecutadas/total;
  // Calcular ritmo esperado según fechas
  const inicio = new Date(proy.fechaInicio);
  const fin    = new Date(proy.fechaFin);
  const hoy    = new Date();
  const totalDias  = Math.max(1,(fin-inicio)/(1000*60*60*24));
  const diasPasados= Math.max(0,(hoy-inicio)/(1000*60*60*24));
  const pctEsperado= Math.min(1, diasPasados/totalDias);
  if(pct >= pctEsperado - 0.05) return 'verde';
  if(pct >= pctEsperado - 0.15) return 'amarillo';
  return 'rojo';
}

function tipoLabel(tipo){
  const m={'Migración':'b-migracion','Rollout':'b-rollout','Apertura':'b-apertura','Remodelación':'b-remodelacion'};
  return m[tipo]||'b-sin';
}

function _renderProyectosTabla(){
  const activos   = proyectos.filter(p=>p.estatus==='Activo').length;
  const pausados  = proyectos.filter(p=>p.estatus==='Pausado').length;
  const terminados= proyectos.filter(p=>p.estatus==='Terminado').length;

  let rows='';
  if(!proyectos.length){
    rows=`<tr><td colspan="8"><div class="empty"><div class="e-icon">▦</div>Sin proyectos registrados. Crea el primero con el botón + Nuevo proyecto.</div></td></tr>`;
  } else {
    rows = proyectos.map(p=>{
      const total      = p.sucursales.filter(s=>s.estatus!=='Cancelada').length;
      const ejecutadas = p.sucursales.filter(s=>s.estatus==='Ejecutada'||s.estatus==='Documentada').length;
      const completas  = p.sucursales.filter(s=>s.estatus==='Documentada').length;
      const pct        = total ? Math.round(ejecutadas/total*100) : 0;
      const sem        = calcSemaforo(p);
      const semCls     = {verde:'sem-verde',amarillo:'sem-amarillo',rojo:'sem-rojo'}[sem];
      const pendSemana = calcPendientesSemana(p);
      return `<tr class="proy-row" onclick="navTo('detalle-proyecto:${p.id}')">
        <td><span class="folio">${p.id}</span></td>
        <td>
          <div style="font-weight:500;display:flex;align-items:center;gap:6px;">
            <span class="semaforo ${semCls}"></span>${p.cliente}
          </div>
          <div style="font-size:11px;color:var(--text2);">${p.nombre}</div>
        </td>
        <td><span class="badge ${tipoLabel(p.tipo)}">${p.tipo}</span></td>
        <td style="font-family:var(--mono);font-size:12px;color:var(--text2);">${ejecutadas}/${total}</td>
        <td>
          <div class="proy-progress"><div class="proy-progress-bar" style="width:${pct}%"></div></div>
          <div style="font-size:10px;color:var(--text2);margin-top:2px;">${pct}%</div>
        </td>
        <td style="font-size:12px;color:var(--text2);">${p.ritmo} / ${p.unidadRitmo}</td>
        <td style="font-size:11px;color:var(--text3);">${p.fechaFin}</td>
        <td><span class="badge b-${p.estatus.toLowerCase()}">${p.estatus}</span></td>
      </tr>`;
    }).join('');
  }

  document.getElementById('content').innerHTML=`
    <div class="proy-grid">
      <div class="proy-stat"><div class="n n-prog">${activos}</div><div class="l">Proyectos activos</div></div>
      <div class="proy-stat"><div class="n n-open">${pausados}</div><div class="l">Pausados</div></div>
      <div class="proy-stat"><div class="n n-cls">${terminados}</div><div class="l">Terminados</div></div>
    </div>
    <div class="page-header">
      <div class="page-title">Mesa de Proyectos — Proyectos</div>
      <button class="btn btn-ok btn-sm" onclick="navTo('nuevo-proyecto')">＋ Nuevo proyecto</button>
    </div>
    <table class="proy-table">
      <thead><tr>
        <th>ID</th><th>Cliente / Proyecto</th><th>Tipo</th>
        <th>Avance</th><th>%</th><th>Ritmo</th><th>Fecha fin</th><th>Estatus</th>
      </tr></thead>
      <tbody>${rows}</tbody>
    </table>`;
}

function calcPendientesSemana(p){
  const hoy = new Date();
  const lunes = new Date(hoy);
  lunes.setDate(hoy.getDate() - hoy.getDay() + 1);
  lunes.setHours(0,0,0,0);
  const domingo = new Date(lunes); domingo.setDate(lunes.getDate()+6); domingo.setHours(23,59,59,999);
  return p.sucursales.filter(s=>{
    if(!s.fechaProg) return false;
    const fd = new Date(s.fechaProg);
    return fd>=lunes && fd<=domingo && (s.estatus==='Programada'||s.estatus==='Pendiente');
  }).length;
}

  const fin     = document.getElementById('np-fin').value;
  const ritmo   = parseInt(document.getElementById('np-ritmo').value)||0;
  if(!cliente||!nombre||!inicio||!fin||!ritmo){
    showToast('Cliente, nombre, fechas y ritmo son obligatorios','err'); return;
  }
  const p = {
    id:         '',
    cliente:    cliente.toUpperCase(),
    nombre:     nombre.toUpperCase(),
    tipo:       document.getElementById('np-tipo').value,
    estatus:    document.getElementById('np-estatus').value,
    fechaInicio:inicio,
    fechaFin:   fin,
    ritmo,
    unidadRitmo: document.getElementById('np-unidad').value,
    contacto:   document.getElementById('np-contacto').value.trim().toUpperCase(),
    contactoTel:document.getElementById('np-contactotel').value.trim(),
    notas:      document.getElementById('np-notas').value.trim().toUpperCase(),
    creadoPor:  session.name,
    fechaCreacion: now(),
    sucursales: window._tempSucs || [],
    semanas:    []
  };
  showToast('Guardando proyecto...','ok');
  const res = await apiPost({ action:'crearProyecto', ticket:p });
  if(res.ok){
    p.id = res.data.id;
    proyectos.unshift(p);
    showToast('Proyecto '+p.id+' creado con '+p.sucursales.length+' sucursal(es)','ok');
    navTo('detalle-proyecto:'+p.id);
  } else {
    showToast('Error al guardar: '+res.error,'err');
  }
}

// RENDER: DETALLE DE PROYECTO
// ══════════════════════════════════════════════════════════
function renderDetalleProyecto(id){
  const p = proyectos.find(x=>x.id===id);
  if(!p){ navTo('proyectos'); return; }

  const total      = p.sucursales.filter(s=>s.estatus!=='Cancelada').length;
  const pendientes = p.sucursales.filter(s=>s.estatus==='Pendiente').length;
  const programadas= p.sucursales.filter(s=>s.estatus==='Programada').length;
  const ejecutadas = p.sucursales.filter(s=>s.estatus==='Ejecutada'||s.estatus==='Documentada').length;
  const completas  = p.sucursales.filter(s=>s.estatus==='Documentada').length;
  const canceladas = p.sucursales.filter(s=>s.estatus==='Cancelada').length;
  const pct        = total ? Math.round(ejecutadas/total*100) : 0;
  const sem        = calcSemaforo(p);
  const semCls     = {verde:'sem-verde',amarillo:'sem-amarillo',rojo:'sem-rojo'}[sem];
  const semTxt     = {verde:'En ritmo ✓',amarillo:'Retraso leve ⚠',rojo:'En riesgo ✕'}[sem];
  const semColor   = {verde:'#3fb950',amarillo:'var(--warn2)',rojo:'var(--danger2)'}[sem];

  // Calcular semanas pendientes para cumplir el proyecto
  const fin = new Date(p.fechaFin);
  const hoy = new Date();
  const semanasRestantes = Math.max(0, Math.ceil((fin-hoy)/(1000*60*60*24*7)));
  const sucPendientes = p.sucursales.filter(s=>s.estatus==='Pendiente'||s.estatus==='Programada').length;
  const ritmoNecesario = semanasRestantes > 0 ? Math.ceil(sucPendientes/semanasRestantes) : sucPendientes;

  // Tabla de sucursales
  const sucRows = p.sucursales.length ? p.sucursales.map((s,i)=>`
    <tr class="suc-row">
      <td style="font-family:var(--mono);color:var(--accent2);font-size:11px;">${s.id}</td>
      <td style="font-weight:500;">${s.nombre}</td>
      <td style="color:var(--text2);font-size:11px;">${s.dir||'—'}</td>
      <td>
        <select onchange="cambiarEstatusSuc('${p.id}',${i},this.value)"
          style="padding:3px 6px;background:var(--bg);border:1px solid var(--border);border-radius:4px;color:var(--text);font-size:11px;font-family:var(--font);">
          <option ${s.estatus==='Pendiente'?'selected':''}>Pendiente</option>
          <option ${s.estatus==='Programada'?'selected':''}>Programada</option>
          <option ${s.estatus==='Ejecutada'?'selected':''}>Ejecutada</option>
          <option ${s.estatus==='Documentada'?'selected':''}>Documentada</option>
          <option ${s.estatus==='Cancelada'?'selected':''}>Cancelada</option>
        </select>
      </td>
      <td>
        <input type="date" value="${normalizarFecha(s.fechaProg)||''}" style="text-transform:none!important;
          padding:3px 6px;background:var(--bg);border:1px solid var(--border);border-radius:4px;
          color:var(--text);font-size:11px;font-family:var(--font);"
          onchange="cambiarFechaSuc('${p.id}',${i},this.value)">
      </td>
      <td>
        <div style="display:flex;gap:4px;">
          <input type="text" placeholder="No. emp" value="${s.tecnico||''}"
            id="tec-suc-num-${p.id}-${i}"
            style="width:65px;padding:3px 6px;background:var(--bg);border:1px solid var(--border);border-radius:4px;color:var(--text);font-size:11px;font-family:var(--font);">
          <input type="text" placeholder="Nombre" value="${s.tecnicoName||''}"
            id="tec-suc-nom-${p.id}-${i}"
            style="width:90px;padding:3px 6px;background:var(--bg);border:1px solid var(--border);border-radius:4px;color:var(--text);font-size:11px;font-family:var(--font);">
          <button onclick="asignarTecnicoSuc('${p.id}',${i})"
            style="padding:3px 8px;background:var(--ok);border:none;border-radius:4px;color:#fff;font-size:11px;cursor:pointer;">✓</button>
        </div>
      </td>
      <td style="text-align:center;">
        <input type="checkbox" ${s.expediente?'checked':''} title="Expediente completo"
          onchange="toggleExpediente('${p.id}',${i},this.checked)"
          style="width:14px;height:14px;cursor:pointer;">
      </td>
      <td>
        ${session.role==='supervisor'?`<button onclick="cancelarSucursal('${p.id}',${i})"
          style="padding:2px 8px;background:none;border:1px solid var(--border);border-radius:4px;
          color:var(--text3);font-size:10px;cursor:pointer;" title="Cancelar sucursal">✕</button>`:''}
      </td>
    </tr>`).join('') :
    `<tr><td colspan="8"><div class="empty" style="padding:24px;"><div class="e-icon">🏪</div>Sin sucursales. Agrégalas con el botón de abajo.</div></td></tr>`;

  document.getElementById('content').innerHTML=`
    <div class="page-header">
      <div style="display:flex;align-items:center;gap:12px;">
        <button class="btn btn-ghost btn-sm" onclick="navTo('proyectos')">← Proyectos</button>
        <div>
          <div class="page-title">${p.cliente} — ${p.nombre}</div>
          <div style="font-size:11px;color:var(--text2);font-family:var(--mono);margin-top:2px;">
            ${p.id} · ${p.tipo} · Creado por ${p.creadoPor}
          </div>
        </div>
      </div>
      <div style="display:flex;gap:8px;align-items:center;">
        <span class="badge ${tipoLabel(p.tipo)}">${p.tipo}</span>
        <span class="badge b-${p.estatus.toLowerCase()}">${p.estatus}</span>
        ${session.role==='supervisor'||session.role==='agente'?`
          <button class="btn btn-purple btn-sm" onclick="abrirModalOT('${p.id}')">🖨 Generar OT Jornada</button>`:''
        }
        ${session.role==='supervisor'?`
          <button class="btn btn-ghost btn-sm" onclick="toggleEstatusProy('${p.id}')">

      <div class="stat"><div class="n" style="font-size:22px;color:var(--text3);">${pendientes}</div><div class="l">Pendientes</div></div>

      <div class="stat"><div class="n" style="font-size:22px;color:var(--warn2);">${ejecutadas}</div><div class="l">Ejecutadas</div></div>
      <div class="stat"><div class="n" style="font-size:22px;color:#3fb950;">${completas}</div><div class="l">Completas</div></div>
      <div class="stat"><div class="n" style="font-size:22px;color:var(--danger2);">${canceladas}</div><div class="l">Canceladas</div></div>
    </div>

    <!-- Panel de control -->
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:20px;">
      <div style="background:var(--s1);border:1px solid var(--border);border-radius:8px;padding:16px;">
        <div style="font-size:11px;color:var(--text2);text-transform:uppercase;letter-spacing:.4px;margin-bottom:8px;">Ritmo y semáforo</div>
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px;">
          <span class="semaforo ${semCls}" style="width:14px;height:14px;"></span>
          <span style="font-size:14px;font-weight:600;color:${semColor};">${semTxt}</span>
        </div>
        <div style="font-size:12px;color:var(--text2);line-height:1.8;">
          Ritmo pactado: <strong>${p.ritmo} ${p.unidadRitmo}</strong><br>
          Semanas restantes: <strong>${semanasRestantes}</strong><br>
          Sucursales pendientes: <strong>${sucPendientes}</strong><br>
          Ritmo necesario esta semana: <strong style="color:${ritmoNecesario>p.ritmo?'var(--danger2)':'#3fb950'};">${ritmoNecesario} ${p.unidadRitmo}</strong>

      <div style="background:var(--s1);border:1px solid var(--border);border-radius:8px;padding:16px;">
        <div style="font-size:11px;color:var(--text2);text-transform:uppercase;letter-spacing:.4px;margin-bottom:8px;">Datos del proyecto</div>
        <div style="font-size:12px;color:var(--text2);line-height:1.8;">
          Inicio: <strong>${p.fechaInicio}</strong><br>
          Fin comprometido: <strong>${p.fechaFin}</strong><br>
          Contacto cliente: <strong>${p.contacto||'—'}</strong><br>
          ${p.contactoTel?`Tel/Correo: <strong>${p.contactoTel}</strong><br>`:''}
          ${p.notas?`<span style="color:var(--text3);font-size:11px;">${p.notas}</span>`:''}
        </div>
      </div>
    </div>

    <!-- Progreso general -->
    <div style="background:var(--s1);border:1px solid var(--border);border-radius:8px;padding:14px;margin-bottom:20px;">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">
        <div style="font-size:12px;font-weight:600;">Avance general del proyecto</div>
        <div style="font-size:13px;font-weight:600;font-family:var(--mono);color:var(--accent2);">${pct}%</div>
      </div>
      <div class="proy-progress" style="height:10px;">
        <div class="proy-progress-bar" style="width:${pct}%;height:10px;"></div>
      </div>
      <div style="display:flex;justify-content:space-between;font-size:10px;color:var(--text3);margin-top:4px;">
        <span>${ejecutadas} ejecutadas</span><span>${total} total</span>
      </div>
    </div>

    <!-- Acciones supervisor -->
    ${session.role==='supervisor'?`
    <div style="background:var(--s1);border:1px solid var(--border);border-radius:8px;padding:14px;margin-bottom:20px;">
      <div style="font-size:11px;color:var(--text2);text-transform:uppercase;letter-spacing:.4px;margin-bottom:10px;">Agregar sucursal al proyecto</div>

// ══════════════════════════════════════════════════════════
// ACCIONES DE PROYECTO — conectadas al backend
// ══════════════════════════════════════════════════════════
async function toggleEstatusProy(id){
  const p = proyectos.find(x=>x.id===id); if(!p) return;
  p.estatus = p.estatus==='Activo' ? 'Pausado' : 'Activo';
  await apiPost({ action:'actualizarProyecto', proy:p });
  showToast('Proyecto '+p.estatus,'ok');
  renderDetalleProyecto(id);
}

async function agregarSucursalProyecto(proyId){
  const p = proyectos.find(x=>x.id===proyId); if(!p) return;
  const id     = document.getElementById('add-suc-id').value.trim().toUpperCase();
  const nombre = document.getElementById('add-suc-nombre').value.trim().toUpperCase();
  const dir    = document.getElementById('add-suc-dir').value.trim().toUpperCase();
  if(!id && !nombre){ showToast('Ingresa ID o nombre de sucursal','err'); return; }
  const suc = {
    id: id || ('SUC-'+String(p.sucursales.length+1).padStart(3,'0')),
    nombre: nombre||id, dir,
    estatus:'Pendiente', fechaProg:'', tecnico:'', tecnicoName:'',
    expediente:false, notas:''
  };
  const res = await apiPost({ action:'agregarSucursal', data:{ proyId, sucursal:suc } });
  if(res.ok){
    p.sucursales.push(suc);
    showToast('Sucursal agregada','ok');
  } else {
    showToast('Error: '+res.error,'err');
  }
  renderDetalleProyecto(proyId);
}

async function cancelarSucursal(proyId, idx){
  const p = proyectos.find(x=>x.id===proyId); if(!p) return;
  if(!confirm('\u00bfCancelar la sucursal "'+p.sucursales[idx].nombre+'"? Quedar\u00e1 registrada como cancelada.')) return;
  p.sucursales[idx].estatus='Cancelada';
  await apiPost({ action:'actualizarSucursal', data:{ proyId, idx, sucursal:p.sucursales[idx] } });
  showToast('Sucursal cancelada','ok');
  renderDetalleProyecto(proyId);
}

async function cambiarEstatusSuc(proyId, idx, nuevoEstatus){
  const p = proyectos.find(x=>x.id===proyId); if(!p) return;
  p.sucursales[idx].estatus = nuevoEstatus;
  await apiPost({ action:'actualizarSucursal', data:{ proyId, idx, sucursal:p.sucursales[idx] } });
}

async function cambiarFechaSuc(proyId, idx, fecha){
  const p = proyectos.find(x=>x.id===proyId); if(!p) return;
  p.sucursales[idx].fechaProg = normalizarFecha(fecha);
  if(fecha && p.sucursales[idx].estatus==='Pendiente'){
    p.sucursales[idx].estatus='Programada';
  }
  const res = await apiPost({ action:'actualizarSucursal', data:{ proyId, idx, sucursal:p.sucursales[idx] } });
  if(res.ok) showToast('Fecha guardada','ok');
  else showToast('Error al guardar fecha: '+res.error,'err');
}

async function asignarTecnicoSuc(proyId, idx){
  const p = proyectos.find(x=>x.id===proyId); if(!p) return;
  const num = document.getElementById('tec-suc-num-'+proyId+'-'+idx).value.trim().toUpperCase();
  const nom = document.getElementById('tec-suc-nom-'+proyId+'-'+idx).value.trim().toUpperCase();
  if(!num && !nom){ showToast('Ingresa n\u00famero o nombre del t\u00e9cnico','err'); return; }
  p.sucursales[idx].tecnico     = num;
  p.sucursales[idx].tecnicoName = nom;
  await apiPost({ action:'actualizarSucursal', data:{ proyId, idx, sucursal:p.sucursales[idx] } });
  showToast('T\u00e9cnico asignado: '+nom,'ok');
}

async function toggleExpediente(proyId, idx, val){
  const p = proyectos.find(x=>x.id===proyId); if(!p) return;
  p.sucursales[idx].expediente = val;
  if(val && p.sucursales[idx].estatus==='Ejecutada'){
    p.sucursales[idx].estatus='Documentada';
    showToast('Sucursal marcada como Documentada','ok');
  }
  await apiPost({ action:'actualizarSucursal', data:{ proyId, idx, sucursal:p.sucursales[idx] } });
}

// ══════════════════════════════════════════════════════════
// OT DE JORNADA
// ══════════════════════════════════════════════════════════
function abrirModalOT(proyId){
  const p = proyectos.find(x=>x.id===proyId); if(!p) return;

  // Debug: mostrar fechas para diagnóstico
  console.log('Sucursales:', p.sucursales.map(s=>({id:s.id, fechaProg:s.fechaProg, estatus:s.estatus})));

  // Normalizar fechas — Sheets puede devolver Date objects o strings en varios formatos
  p.sucursales.forEach(s=>{
    if(s.fechaProg && typeof s.fechaProg !== 'string'){
      // Es un objeto Date de Sheets
      const d = new Date(s.fechaProg);
      s.fechaProg = d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
    } else if(s.fechaProg && s.fechaProg.includes('/')){
      // Formato dd/mm/yyyy
      const [dd,mm,yyyy] = s.fechaProg.split('/');
      s.fechaProg = yyyy+'-'+mm.padStart(2,'0')+'-'+dd.padStart(2,'0');
    }
  });

  // Obtener fechas únicas con sucursales programadas
  const fechas = [...new Set(
    p.sucursales
      .filter(s=>s.fechaProg && s.estatus!=='Cancelada')
      .map(s=>s.fechaProg)
  )].sort();

  const opcionesFechas = fechas.length
    ? fechas.map(f=>`<option value="${f}">${formatFecha(f)}</option>`).join('')
    : '<option value="">— Sin fechas programadas —</option>';

  document.getElementById('modal-box').innerHTML=`
    <div class="modal-hdr">
      <div>
        <h3>Generar OT de Jornada</h3>
        <div class="modal-folio">${p.id} · ${p.cliente} — ${p.nombre}</div>
      </div>
      <button class="btn-cls" onclick="closeModal()">×</button>
    </div>
    <div class="modal-body">
      <div class="fg">
        <label>Selecciona la jornada (fecha)</label>
        <select id="ot-fecha-sel" onchange="previsualizarOT('${proyId}',this.value)"
          style="text-transform:none!important;">
          <option value="">— Selecciona una fecha —</option>
          ${opcionesFechas}
        </select>
      </div>
      <div id="ot-preview"></div>
      <div style="margin-top:16px;display:flex;gap:8px;">
        <button class="btn btn-purple" onclick="imprimirOTJornada('${proyId}')">🖨 Imprimir OT</button>
        <button class="btn btn-ghost" onclick="closeModal()">Cancelar</button>
      </div>
    </div>`;
  document.getElementById('overlay').classList.add('open');
}

function formatFecha(f){
  if(!f) return '—';
  const [y,m,d] = f.split('-');
  const dias = ['Domingo','Lunes','Martes','Miércoles','Jueves','Viernes','Sábado'];
  const meses = ['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];
  const dt = new Date(y, m-1, d);
  return dias[dt.getDay()]+' '+d+' de '+meses[m-1]+' de '+y;
}

function previsualizarOT(proyId, fecha){
  const p = proyectos.find(x=>x.id===proyId); if(!p) return;
  const el = document.getElementById('ot-preview'); if(!el) return;
  if(!fecha){ el.innerHTML=''; return; }

  const sucs = p.sucursales.filter(s=>s.fechaProg===fecha && s.estatus!=='Cancelada');
  if(!sucs.length){
    el.innerHTML='<div style="color:var(--text3);font-size:12px;text-align:center;padding:16px;">Sin sucursales programadas para esta fecha</div>';
    return;
  }

  el.innerHTML=`
    <div style="background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:14px;margin-top:8px;">
      <div style="font-size:11px;color:var(--text2);text-transform:uppercase;letter-spacing:.4px;margin-bottom:10px;">
        Vista previa — ${sucs.length} sucursal(es) para ${formatFecha(fecha)}
      </div>
      ${sucs.map(s=>`
        <div style="border:1px solid var(--border);border-radius:6px;padding:10px 14px;margin-bottom:8px;display:flex;align-items:center;gap:12px;">
          <div style="width:18px;height:18px;border:2px solid var(--border2);border-radius:3px;flex-shrink:0;"></div>
          <div style="flex:1;">
            <div style="font-weight:600;font-size:13px;">${s.nombre}</div>
            <div style="font-size:11px;color:var(--text2);">ID: ${s.id}${s.dir?' · '+s.dir:''}</div>
          </div>
          <div style="font-size:11px;color:var(--text3);">${s.tecnicoName||'Sin técnico'}</div>
        </div>`).join('')}
    </div>`;
}

function imprimirOTJornada(proyId){
  const p = proyectos.find(x=>x.id===proyId); if(!p) return;
  const fecha = document.getElementById('ot-fecha-sel').value;
  if(!fecha){ showToast('Selecciona una fecha','err'); return; }

  const sucs = p.sucursales.filter(s=>s.fechaProg===fecha && s.estatus!=='Cancelada');
  if(!sucs.length){ showToast('Sin sucursales para esta fecha','err'); return; }

  showToast('Generando PDF...','ok');

  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({ orientation:'portrait', unit:'mm', format:'letter' });

  const pageW   = 215.9;
  const margin  = 15;
  const contentW= pageW - margin*2;
  let y         = margin;

  const negro   = [0,0,0];
  const gris    = [80,80,80];
  const grisCla = [160,160,160];
  const hline   = (yy) => { doc.setDrawColor(0); doc.setLineWidth(0.3); doc.line(margin,yy,pageW-margin,yy); };
  const col1    = margin;
  const col2    = margin + contentW/2;

  // ── ENCABEZADO ──────────────────────────────────────
  doc.setFontSize(13); doc.setFont('helvetica','bold'); doc.setTextColor(...negro);
  doc.text('CENTRO DE SERVICIOS EN COMUNICACION S.A. DE C.V.', margin, y+5);
  doc.setFontSize(8); doc.setFont('helvetica','normal'); doc.setTextColor(...gris);
  doc.text('Nubia #112, Col. Claveria, Azcapotzalco, CDMX  |  Tel. 49973448  |  www.csco.mx', margin, y+10);

  doc.setFontSize(16); doc.setFont('helvetica','bold'); doc.setTextColor(...negro);
  doc.text('ORDEN DE TRABAJO', pageW-margin, y+5, {align:'right'});
  doc.setFontSize(10);
  const folioJornada = p.id+'-'+fecha.replace(/-/g,'');
  doc.text(folioJornada, pageW-margin, y+12, {align:'right'});

  y += 15; hline(y); y += 4;

  doc.setFontSize(8); doc.setFont('helvetica','normal'); doc.setTextColor(...gris);
  doc.text('Proyecto: '+p.id, margin, y);
  doc.text('Emitida: '+now(), pageW-margin, y, {align:'right'});
  y += 6;

  // ── NOTAS DEL PROYECTO (si existen) ─────────────────
  if(p.notas){
    hline(y); y += 4;
    doc.setFontSize(8); doc.setFont('helvetica','bold'); doc.setTextColor(...negro);
    doc.text('INDICACIONES GENERALES DEL PROYECTO:', margin, y);
    doc.setFont('helvetica','normal');
    const notasLines = doc.splitTextToSize(p.notas, contentW-65);
    doc.text(notasLines, margin+68, y);
    y += Math.max(5, notasLines.length*4)+2;
  }

  // ── DATOS DEL PROYECTO Y SERVICIO ───────────────────
  hline(y); y += 3;
  doc.setFontSize(9); doc.setFont('helvetica','bold'); doc.setTextColor(...negro);
  doc.text('DATOS DEL PROYECTO Y JORNADA', margin, y+4);
  y += 7; hline(y); y += 3;

  doc.setFontSize(7);
  const camposP = [
    ['EMPRESA / CLIENTE', p.cliente, 'TIPO DE PROYECTO', p.tipo],
    ['NOMBRE DEL PROYECTO', p.nombre.substring(0,38), 'FOLIO PROYECTO', p.id],
    ['CONTACTO CLIENTE', p.contacto||'—', 'TEL / CORREO', p.contactoTel||'—'],
    ['FECHA DE JORNADA', formatFecha(fecha), 'GENERADO POR', session.name],
  ];
  camposP.forEach(([l1,v1,l2,v2])=>{
    doc.setFont('helvetica','bold'); doc.setTextColor(...gris);
    doc.text(l1, col1, y); doc.text(l2, col2, y);
    y += 4;
    doc.setFont('helvetica','normal'); doc.setTextColor(...negro);
    doc.text(String(v1).substring(0,38), col1, y);
    doc.text(String(v2).substring(0,32), col2, y);
    y += 5;
  });

  // Hora de inicio
  doc.setFont('helvetica','bold'); doc.setTextColor(...gris);
  doc.text('HORA DE INICIO', col1, y);
  doc.text('HORA DE TERMINO', col2, y);
  y += 4;
  doc.line(col1, y, col1+50, y);
  doc.line(col2, y, col2+50, y);
  y += 6;

  // ── SUCURSALES A VISITAR ─────────────────────────────
  hline(y); y += 3;
  doc.setFontSize(9); doc.setFont('helvetica','bold'); doc.setTextColor(...negro);
  doc.text('SUCURSALES A VISITAR EN ESTA JORNADA', margin, y+4);
  y += 7; hline(y); y += 2;

  // Header tabla sucursales
  doc.setFontSize(7); doc.setFont('helvetica','bold'); doc.setTextColor(...gris);
  doc.text('✓', margin+2, y+3);
  doc.text('#', margin+10, y+3);
  doc.text('ID SUCURSAL', margin+18, y+3);
  doc.text('NOMBRE', margin+55, y+3);
  doc.text('DIRECCIÓN', margin+120, y+3);
  y += 5; hline(y); y += 1;

  sucs.forEach((s, idx)=>{
    if(y > 240){ doc.addPage(); y = margin; }
    // Asegurar que todos los campos son strings
    const sId     = String(s.id||'').substring(0,14);
    const sNombre = String(s.nombre||'').substring(0,28);
    const sDir    = String(s.dir||'—').substring(0,30);
    doc.setFontSize(8); doc.setFont('helvetica','normal'); doc.setTextColor(...grisCla);
    doc.setLineWidth(0.4); doc.rect(margin+1, y+1, 5, 5);
    doc.text(String(idx+1), margin+11, y+5, {align:'center'});
    doc.setTextColor(...negro);
    doc.text(sId, margin+18, y+5);
    doc.text(sNombre, margin+55, y+5);
    doc.setTextColor(...grisCla);
    doc.text(sDir, margin+120, y+5);
    doc.line(margin, y+7, pageW-margin, y+7);
    y += 7;
  });
  y += 4;

  // ── MATERIALES Y EQUIPO ──────────────────────────────
  if(y > 210){ doc.addPage(); y = margin; }
  hline(y); y += 3;
  doc.setFontSize(9); doc.setFont('helvetica','bold'); doc.setTextColor(...negro);
  doc.text('MATERIALES Y EQUIPO A UTILIZAR  (completar antes de salir)', margin, y+4);
  y += 7; hline(y); y += 2;

  doc.setFontSize(7); doc.setFont('helvetica','bold'); doc.setTextColor(...gris);
  doc.text('#', margin+3, y+3);
  doc.text('MATERIAL / EQUIPO', margin+12, y+3);
  doc.text('NO. SERIE / PARTE', margin+120, y+3);
  doc.text('CANT', margin+170, y+3);
  y += 5; hline(y); y += 1;

  for(let r=1; r<=5; r++){
    doc.setFontSize(8); doc.setFont('helvetica','normal'); doc.setTextColor(...grisCla);
    doc.text(String(r), margin+4, y+5, {align:'center'});
    doc.line(margin+8, y, margin+8, y+7);
    doc.line(margin+115, y, margin+115, y+7);
    doc.line(margin+165, y, margin+165, y+7);
    doc.line(margin, y+7, pageW-margin, y+7);
    y += 7;
  }
  y += 4;

  // ── OBSERVACIONES ────────────────────────────────────
  if(y > 220){ doc.addPage(); y = margin; }
  hline(y); y += 3;
  doc.setFontSize(9); doc.setFont('helvetica','bold'); doc.setTextColor(...negro);
  doc.text('OBSERVACIONES DEL TÉCNICO  (completar al terminar)', margin, y+4);
  y += 7; hline(y);
  y += 14; hline(y); y += 4;

  doc.setFontSize(9); doc.setFont('helvetica','normal'); doc.setTextColor(...negro);
  doc.text('Todas las sucursales completadas:  SI [  ]   NO [  ]', margin, y);
  doc.text('Pendientes para siguiente jornada:  SI [  ]   NO [  ]', margin+95, y);
  y += 8;

  // ── FIRMA UNICA DE CONFORMIDAD ───────────────────────
  hline(y); y += 3;
  doc.setFontSize(9); doc.setFont('helvetica','bold'); doc.setTextColor(...negro);
  doc.text('CONFORMIDAD DEL SERVICIO', margin, y+4);
  y += 7; hline(y); y += 4;

  const fw = contentW/3;
  const firmas = ['ELABORO / SUPERVISOR', 'TÉCNICO RESPONSABLE', 'RECIBIDO CONFORME'];
  firmas.forEach((f,i)=>{
    const fx = margin + fw*i;
    doc.setFontSize(7); doc.setFont('helvetica','bold'); doc.setTextColor(...gris);
    doc.text(f, fx+2, y+3);
    doc.setFont('helvetica','normal'); doc.setTextColor(...grisCla);
    doc.text('Nombre:', fx+2, y+10); doc.line(fx+16, y+10, fx+fw-3, y+10);
    doc.text('Firma:',  fx+2, y+18); doc.line(fx+14, y+18, fx+fw-3, y+18);
    // Espacio para anotar sucursal a mano solo en la columna de recibido
    if(i===2){
      doc.text('Sucursal:', fx+2, y+26); doc.line(fx+18, y+26, fx+fw-3, y+26);
      doc.text('Fecha:',    fx+2, y+33); doc.line(fx+14, y+33, fx+fw-3, y+33);
    } else {
      doc.text('Fecha:',    fx+2, y+26); doc.line(fx+14, y+26, fx+fw-3, y+26);
    }
    if(i<2){ doc.setDrawColor(180); doc.line(fx+fw-1, y, fx+fw-1, y+36); doc.setDrawColor(0); }
  });
  y += 38;

  // ── PIE ──────────────────────────────────────────────
  hline(y); y += 3;
  doc.setFontSize(7); doc.setFont('helvetica','normal'); doc.setTextColor(...grisCla);
  doc.text('FOR-003  Rev.01  |  SGC ISO 9001:2015  |  CSCO', margin, y+3);
  doc.text('Generada: '+now(), pageW-margin, y+3, {align:'right'});

  const nombrePDF = folioJornada+'.pdf';
  doc.save(nombrePDF);
  showToast('PDF '+nombrePDF+' descargado','ok');
  closeModal();
}



</script>
<script>
const ICON_192 = './icon.png';
const ICON_512 = './icon.png';

// Favicon
const favicon = document.createElement('link');
favicon.rel = 'icon'; favicon.type = 'image/png'; favicon.href = ICON_192;
document.head.appendChild(favicon);

// Apple touch icon
const apple = document.createElement('link');
apple.rel = 'apple-touch-icon'; apple.href = ICON_192;
document.head.appendChild(apple);

// Manifest
const manifest = {
  name: 'CSCO Mesa de Servicio',
  short_name: 'CSCO Mesa',
  start_url: './',
  display: 'standalone',
  background_color: '#0d1117',
  theme_color: '#1a5276',
  icons: [
    { src: ICON_192, sizes: '192x192', type: 'image/png' },
    { src: ICON_512, sizes: '512x512', type: 'image/png' }
  ]
};
const mblob = new Blob([JSON.stringify(manifest)], {type:'application/json'});
const mlink = document.createElement('link');
mlink.rel = 'manifest'; mlink.href = URL.createObjectURL(mblob);
document.head.appendChild(mlink);
</script>
</body>
